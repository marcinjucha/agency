project:
  name: "Platforma Sklepowa"
  type: monorepo-extension
  notion_project: "AAA-P-9"
  parent_monorepo: "legal-mind (Halo Efekt)"
  tech_stack: "TanStack Start v1.167, Vite 8, React 19, Tailwind CSS 4 (@tailwindcss/vite), shadcn/ui, Supabase (shared DB, shop_ prefix), Plausible Analytics (reuse). CMS features still Next.js 16."

architecture:
  key_decisions:
    - "Single Supabase DB — shop_ prefixed tables in same project as Halo Efekt, shared RLS patterns"
    - "CMS extended — features/shop-products/ and features/shop-categories/ in apps/cms, NOT a separate CMS"
    - "Separate frontends per client — apps/shop/jacek/ and apps/shop/oleg/ migrated to TanStack Start v1.167 + Vite 8 (2026-04-15). apps/shop/tata/ planned but not built."
    - "Tata: hybrid — external_link (paid books via Zolix/platform) + digital_download (free materials from S3). Kolega: external_link only (OLX/Allegro)"
    - "is_featured BOOLEAN on shop_products — homepage featured products, CMS toggle with Star icon. Affects all shops (shared table), DEFAULT false."
    - "Reuse packages — @agency/ui, @agency/database, @agency/email, editor, media, SEO, legal pages"
    - "Sidebar 'Sklep' section — hardcoded initially, feature flags later (AAA-T-141 in Core CMS)"
    - "apps/shop/ parent folder — shared config/components possible, each client subfolder is a standalone TanStack Start + Vite 8 app (migrated from Next.js 2026-04-15)"
    - "Tata visual direction: dark + warm amber ('library at night'), serif headings (Merriweather/Lora) + sans body (Geist), editorial layout for book detail pages"
    - "Tata purchase flow: external_link → redirect to Zolix/platform for paid books, digital_download → free PDF from S3 for bonus materials"
    - "Tata nav: minimal 3 links (Książki, O Autorze, Kontakt), no hamburger, homepage grid = book listing"
    - "Cookie banner reused from Halo Efekt, Plausible analytics, polityka prywatności (basic)"

  dependency_graph: "1 → 2 → [3 + 4] → 5 → [6 already done] → [7 + 8] → 9 → 10"
  critical_path: "1 → 2 → 5 → 7 → 10"

  cross_project_dependencies:
    - "AAA-T-136 (Core CMS) — Media library folder support → blocks AAA-T-137 (product editor) [RESOLVED 2026-03-30]"
    - "AAA-T-141 (Core CMS) — Tenant feature flags + conditional sidebar → blocks AAA-T-142 (polish)"

features:
  # Iteration 1
  - name: "DB Schema"
    task: "AAA-T-133"
    iteration: 1
    size: M
    status: done
    description: "shop_products (25 cols), shop_categories (8 cols), media_folders (7 cols, self-referential parent_id), media_items.folder_id FK. listing_type enum (external_link | digital_download), display_layout CHECK (gallery | editorial), NUMERIC(10,2) price, TEXT[] tags, JSONB description/images/seo_metadata. All with tenant-isolated RLS + anon SELECT for published products/categories."
    why: "Foundation — all other features depend on the data model"
    depends_on: []
    completion_notes: "Migration 20260330000000_create_shop_schema.sql pushed to remote. Types regenerated. Two non-blocking warnings: NULL parent_id bypasses UNIQUE on root-level media folders (app-level validation later), redundant indexes on UNIQUE constraints (minor storage waste)."

  # Iteration 2
  - name: "CMS Foundation"
    task: "AAA-T-134"
    iteration: 2
    size: M
    status: done
    description: "types.ts, validation.ts, queries.ts, queries.server.ts, actions.ts, utils.ts for shop-products and shop-categories. Routes + messages added."
    why: "TypeScript foundation files enable CMS UI and shop frontend development"
    depends_on: ["DB Schema"]
    completion_notes: "CMS operators can create, read, update, and delete shop products and categories via typed Server Actions. Shared generateSlug extracted to lib/utils/slug.ts. TypeScript compiles clean."

  # Iteration 3
  - name: "CMS Product List + Category Management"
    task: "AAA-T-135"
    iteration: 3
    size: M
    status: done
    description: "/admin/shop product list (grid/table), /admin/shop/categories CRUD, sidebar 'Sklep' section, filtering by category/status."
    why: "CMS operators need to browse and organize products before editing them"
    depends_on: ["CMS Foundation"]
    completion_notes: "CMS operators can browse products with grid/list toggle, filter by category/status/listing_type, sort by name/date/price. Categories manageable via inline Dialog CRUD. Sidebar 'Sklep' section added. Shared badges extracted. Turbopack re-export fix applied."

  # Iteration 4 (parallel with 3) — lives in Core CMS (AAA-P-4)
  # AAA-T-136: Media library folder support — cross-project dependency

  # Iteration 5
  - name: "CMS Product Editor"
    task: "AAA-T-137"
    iteration: 5
    size: L
    status: done
    description: "Product create/edit with Tiptap editor, media library gallery, SEO sidebar, settings sidebar, cover image, layout selector (gallery | editorial)."
    why: "Core editing experience — operators create and manage product content here"
    depends_on: ["CMS Product List + Category Management"]
    acceptance_criteria:
      - verified: true
      - verified: true
      - verified: true
    completion_notes: "CMS operators can create and edit products with full rich-text content (Tiptap), insert media inline, manage gallery images with cover selection, configure listing-type conditional fields, select gallery/editorial layout, manage SEO metadata (title, description, og image, keywords). 2-column layout: content area + 380px sidebar. InsertMediaModal extracted to features/media/ (shared). 10 new components, 1422 lines."

  # Iteration 6
  - name: "Shop App Scaffolding"
    task: "AAA-T-138"
    iteration: 6
    size: M
    status: done
    description: "apps/shop/jacek/ TanStack Start + Vite 8 app — dark + warm amber theme ('library at night'), @fontsource Merriweather serif headings + Geist Sans body, Supabase anon client, createServerFn loaders, ISR via Cache-Control headers, Plausible analytics. Port 3002."
    why: "Standalone frontend app for jacek's product catalog (user's father's shop)"
    depends_on: ["DB Schema"]
    completion_notes: "Scaffolded apps/shop/jacek/ with 15 files. Migrated from Next.js 16 to TanStack Start v1.167 + Vite 8 (2026-04-15). Uses createServerFn for server-only loaders, ISR via Cache-Control headers, @fontsource fonts, @tailwindcss/vite. True anon client (publishable key, not service_role). TENANT_ID as server-only env var. Dev server runs on port 3002."

  # Iteration 7
  - name: "Product Catalog (Listing + Detail)"
    task: "AAA-T-139"
    iteration: 7
    size: M
    status: done
    description: "/produkty grid with category filtering (URL-based), /produkty/[slug] detail with gallery+editorial layouts, ProductCta (buy/download), responsive grid, Navbar (3-link) + Footer, SEO metadata + JSON-LD. Also: /o-autorze, /kontakt placeholder pages, custom 404."
    why: "Public-facing catalog — the main value proposition for jacek's customers"
    depends_on: ["CMS Product Editor", "Shop App Scaffolding"]
    completion_notes: "11 new components, 2 route pages + 2 placeholder pages + not-found. Category filtering via searchParams (server-side). GalleryLayout uses client-side thumbnail state. Build passes clean."

  # Iteration 8 (parallel with 7)
  - name: "Homepage + Search + SEO"
    task: "AAA-T-140"
    iteration: 8
    size: M
    status: done
    description: "Homepage with hero + featured 6 products, URL-based product search (?q=), robots.ts, dynamic sitemap.ts, OG image generation (Edge), title template, Plausible Analytics."
    why: "Discoverability — search engines and users find products"
    depends_on: ["Shop App Scaffolding", "Product Catalog (Listing + Detail)"]
    completion_notes: "ProductSearch with 300ms debounce + router.replace. Sitemap force-dynamic. OG image uses theme HSL values. Sample data: 3 categories, 6 books seeded to production."

  # Oleg Shop — no Notion task
  - name: "Oleg Shop Frontend"
    task: "N/A"
    iteration: "oleg-1"
    size: L
    status: done
    description: "apps/shop/oleg/ — full e-commerce frontend for general merchandise. Light warm linen theme (hsl(40 30% 97%)), steel blue primary, Inter font. Sidebar category filters (240px, server component), featured products via is_featured flag, ProductCard (aspect-[4/5], hover shadow), responsive grid, homepage hero + featured section, sitemap, OG image, JSON-LD. Port 3003."
    why: "Second shop client — validates multi-tenant shop architecture and different visual direction from jacek (dark amber) vs oleg (light linen)"
    depends_on: ["DB Schema", "CMS Product Editor", "Shop App Scaffolding"]
    completion_notes: "28 new files. Migrated from Next.js 16 to TanStack Start v1.167 + Vite 8 (2026-04-15). Same patterns as jacek: createServerFn loaders, ISR headers, @fontsource-variable/inter, CategorySidebar. is_featured migration added to shared shop_products table. Port 3003."

  # Marketplace Integration — AAA-T-157
  - name: "Marketplace Integration (OLX + Allegro)"
    task: "AAA-T-157"
    iteration: "marketplace"
    size: XL
    status: in_progress
    description: "Bidirectional CMS ↔ marketplace sync: OAuth connections, publish flow, status sync (cron), import wizard, adapter pattern (OLX + Allegro). Per-tenant pgcrypto-encrypted OAuth tokens. 4 n8n workflows."
    why: "Enables publishing products from CMS directly to OLX/Allegro and importing existing listings — removes manual copy-paste workflow for shop operators"
    depends_on: ["CMS Product Editor"]
    iterations:
      - name: "DB Schema"
        iteration: 1
        size: M
        status: done
        completion_notes: "shop_marketplace_connections (pgcrypto BYTEA), shop_marketplace_listings (1:N product→listing, status tracking), shop_marketplace_imports (job tracking). Decrypted view (security_invoker=true), RLS, upsert_marketplace_connection() SECURITY DEFINER function."
      - name: "CMS Foundation"
        iteration: 2
        size: M
        status: done
        completion_notes: "types.ts (MarketplaceAdapter interface, labels/options), adapters/registry.ts (MARKETPLACE_REGISTRY), queries.ts, validation.ts, actions.ts (auth guard), query-keys + routes. 3 critical type/DB mismatches caught and fixed by validator."
      - name: "OAuth Flow"
        iteration: 3
        size: M
        status: done
        completion_notes: "API routes /api/marketplace/auth/[marketplace] + /api/marketplace/callback. JWT state (jose, HS256, 10min, CSRF). Token encryption via upsert_marketplace_connection(). connectMarketplace returns authUrl for client-side redirect."
      - name: "Adapter Implementations"
        iteration: 4
        size: L
        status: done
        completion_notes: "adapters/olx.ts + adapters/allegro.ts — 10 methods each. Shared http.ts wrapper (AbortSignal.timeout 15s), credentials.ts (service role + decrypted view). Allegro PATCH for removeListing, Basic auth for token exchange."
      - name: "Marketplace Settings Page"
        iteration: 5
        size: M
        status: done
        completion_notes: "Operators can connect/disconnect OLX and Allegro OAuth from /admin/shop/marketplace. MarketplaceConnectionCard, ConnectMarketplaceButton, ListingStatusBadge, FeedbackBanner. Sidebar nav entry added."
      - name: "Publish Flow"
        iteration: 6
        size: L
        status: done
        completion_notes: "Operators can publish any product to OLX/Allegro from the product editor sidebar. MarketplacePublishPanel (CollapsibleCard), CategorySelector (search/autocomplete), LocationSelector (OLX). Server actions: publish/update/remove with n8n fire-and-forget. /api/marketplace/publish callback updates listing status. Unique index migration on (product_id, connection_id)."
      - name: "Status Sync"
        iteration: 7
        size: M
        status: done
        completion_notes: "n8n Token Refresh workflow (cron 30 min) + Status Sync workflow (cron 15 min). update_marketplace_tokens() SECURITY DEFINER PostgreSQL function (pgcrypto). Detects sold/expired/active changes, updates shop_marketplace_listings."
      - name: "Bidirectional Status Feedback"
        iteration: 8
        size: S
        status: done
        completion_notes: "MarketplaceStatusDots component (batch query, no N+1) shows per-marketplace icons on product list and cards. Token health indicator on ConnectionCard. Retry button in PublishPanel for error-state listings."
      - name: "Import Wizard"
        iteration: 9
        size: L
        status: done
        completion_notes: "Operators can import existing marketplace listings as CMS products. 3-step wizard (select → preview → progress) at /admin/shop/marketplace/import. ImportPreviewTable with duplicate detection by external_listing_id. n8n Marketplace Import workflow paginates marketplace API."
      - name: "Polish"
        iteration: 10
        size: S
        status: done
        completion_notes: "All UI strings in messages.ts (Polish). OLX listing expiry warning. Stuck import detection. P0 accessibility fixes (5), P1 visual fixes (4), code quality fixes (4). All 4 UI states covered."
    remaining: "Manual testing (E2E flow with real OLX/Allegro API keys) — blocker for Done status"

  # Iteration 9 — lives in Core CMS (AAA-P-4)
  # AAA-T-141: Tenant feature flags + conditional sidebar — cross-project dependency

  # Iteration 10
  - name: "Polish, Testing, Deployment"
    task: "AAA-T-142"
    iteration: 10
    size: M
    status: not_started
    description: "E2E flow validation, deployment config (Vercel or VPS+Traefik), documentation, all builds pass."
    why: "Ship it — ensure full CMS-to-shop flow works end-to-end"
    depends_on: ["Product Catalog (Listing + Detail)", "Homepage + Search + SEO"]
    blockers: ["AAA-T-141 (feature flags) in Core CMS"]
