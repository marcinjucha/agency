---

## EXECUTION PHASES

execution_phases:
  - phase: 0
    name: 'External Setup - Google Cloud'
    type: sequential
    critical: true
    blocks_next: true
    duration: '15-30 minutes'
    status: 'prerequisite-user-action'

    tasks:
      - action: 'Create Google Cloud project'
        scope: 'User manual setup'
        verification: 'Project visible in Google Cloud Console'

      - action: 'Enable Google Calendar API'
        scope: 'User manual setup'
        verification: 'API appears in APIs & Services → Library'

      - action: 'Create OAuth 2.0 credentials'
        scope: 'User manual setup'
        verification: 'Client ID and Secret obtained'

      - action: 'Configure redirect URIs'
        scope: 'User manual setup'
        redirect_uris:
          - 'http://localhost:3001/api/auth/google/callback'
          - 'https://legal-mind-cms.vercel.app/api/auth/google/callback'
        verification: 'URIs saved in OAuth consent screen'

      - action: 'Install dependencies'
        commands:
          - 'npm install googleapis --workspace apps/cms'
          - 'npm install date-fns --workspace apps/website'
          - 'npm install date-fns --workspace apps/cms'
        verification: 'No errors during npm install'

    notes: 'STATUS: User has provided credentials. Ready to configure .env.local'

  - phase: 1
    name: 'CMS - Google Calendar OAuth Foundation (CRITICAL)'
    type: sequential
    critical: true
    blocks_next: true
    build_verify: true
    testing_required: true
    duration: '2-3 hours'

    files:
      - path: 'apps/cms/lib/google-calendar/oauth.ts'
        type: 'utility'
        action: 'Create OAuth flow and token management'
        depends_on: []
        imports:
          - 'googleapis library'
          - 'Supabase server client'
        exports:
          - 'getAuthUrl(userId: string)'
          - 'handleCallback(code: string, userId: string)'
          - 'refreshAccessToken(refreshToken: string)'
          - 'revokeAccess(userId: string)'
        complexity: 'high'
        risk: 'Token expiration handling - must refresh automatically'

      - path: 'apps/cms/app/api/auth/google/route.ts'
        type: 'api-route'
        action: 'GET endpoint to initiate OAuth flow'
        depends_on: ['apps/cms/lib/google-calendar/oauth.ts']
        method: 'GET'
        request_params:
          - 'redirect parameter (optional, default: /admin/settings)'
        response: 'Redirect to Google OAuth consent screen'
        complexity: 'medium'

      - path: 'apps/cms/app/api/auth/google/callback/route.ts'
        type: 'api-route'
        action: 'GET endpoint to handle OAuth callback'
        depends_on: ['apps/cms/lib/google-calendar/oauth.ts']
        method: 'GET'
        request_params:
          - 'code (from Google)'
          - 'state (CSRF token)'
        response: 'Redirect to /admin/settings with success message'
        error_handling:
          - 'Invalid code → error message'
          - 'Token save failure → error message'
        complexity: 'medium'

      - path: 'apps/cms/features/calendar/actions.ts'
        type: 'server-action'
        action: 'Create connectGoogleCalendar() and disconnectGoogleCalendar() Server Actions'
        depends_on: ['apps/cms/lib/google-calendar/oauth.ts']
        exports:
          - 'connectGoogleCalendar() → redirects to /api/auth/google'
          - 'disconnectGoogleCalendar() → revokes token'
        complexity: 'low'

      - path: 'apps/cms/app/admin/settings/page.tsx'
        type: 'page'
        action: 'Create settings page with calendar connection UI'
        depends_on: ['apps/cms/features/calendar/actions.ts']
        ui_elements:
          - 'Calendar connection status badge'
          - 'Connect button → calls /api/auth/google'
          - 'Disconnect button → calls disconnectGoogleCalendar'
          - 'Refresh token status'
        complexity: 'medium'

    acceptance_criteria:
      - 'Lawyer can click "Connect Google Calendar" in /admin/settings'
      - 'OAuth flow redirects to Google consent screen'
      - 'After consent, tokens saved to users.google_calendar_token (JSONB)'
      - 'Settings page shows "Connected" status with email'
      - 'Lawyer can disconnect and revoke access'
      - 'Token refresh works automatically on API calls'

    testing:
      - 'Manual: Click connect button, verify Google redirect'
      - 'Manual: Grant permission, verify redirect back'
      - 'Verify in Supabase: users.google_calendar_token has tokens'
      - 'Manual: Click disconnect, verify token revoked'

    build_verify:
      - 'npm run build (CMS) - no TypeScript errors'
      - 'No import cycles'
      - 'API routes properly exported'

    notes:
      - 'This phase is FOUNDATION - all other calendar phases depend on it'
      - 'Token refresh logic critical - must not fail silently'
      - 'Error handling essential (expired links, revoked tokens)'

  - phase: 2
    name: 'CMS - Calendar Event Utilities (CRITICAL)'
    type: sequential
    critical: true
    blocks_next: true
    build_verify: true
    testing_required: true
    duration: '2 hours'

    files:
      - path: 'apps/cms/lib/google-calendar/events.ts'
        type: 'utility'
        action: 'Create Google Calendar API wrapper functions'
        depends_on: ['apps/cms/lib/google-calendar/oauth.ts']
        imports:
          - 'googleapis library'
          - 'oauth.ts (refreshAccessToken, getAuthUrl)'
          - 'date-fns'
        exports:
          - 'getCalendarClient(userId: string)'
          - 'getEvents(userId: string, timeMin: Date, timeMax: Date)'
          - 'createEvent(userId: string, eventData: EventData)'
          - 'updateEvent(userId: string, eventId: string, updates: Partial<EventData>)'
          - 'deleteEvent(userId: string, eventId: string)'
        error_handling:
          - 'Disconnected calendar (no token) → throw error'
          - 'Expired token → auto-refresh → retry'
          - 'Invalid grant → return error'
          - 'Quota limits → return error with message'
        complexity: 'high'
        risk: 'Token lifecycle management - refresh must be automatic'

    acceptance_criteria:
      - 'Can fetch lawyer calendar events for date range'
      - 'Can create test event in lawyer calendar'
      - 'Token refresh works when token expires'
      - 'Error handling for disconnected calendar'
      - 'Timezone-aware date handling'

    testing:
      - 'Unit: Mock googleapis library, test getEvents()'
      - 'Integration: With real Google token, fetch events'
      - 'Integration: Create test event, verify in Google Calendar'
      - 'Test token refresh (mock expired token → auto refresh)'

    build_verify:
      - 'npm run build (CMS) - no errors'
      - 'All functions properly typed'

    notes:
      - 'CRITICAL for Website phases - events.ts used by slots API'
      - 'Must handle Google API rate limits gracefully'
      - 'Token refresh logic from oauth.ts must integrate seamlessly'

  - phase: 3
    name: 'Website - Slots API Foundation (CRITICAL)'
    type: sequential
    critical: true
    blocks_next: true
    build_verify: true
    testing_required: true
    duration: '2-2.5 hours'

    parallel_group: false
    reason_sequential: 'Types must be defined before queries and API route'

    files:
      - path: 'apps/website/features/calendar/types.ts'
        type: 'types'
        action: 'Define TypeScript types for calendar'
        depends_on: []
        exports:
          - 'TimeSlot interface (startTime, endTime, available)'
          - 'BookingData interface (client info)'
          - 'SlotAvailability interface'
        complexity: 'low'

      - path: 'apps/website/features/calendar/queries.ts'
        type: 'query'
        action: 'Create database query functions'
        depends_on: ['apps/website/features/calendar/types.ts']
        exports:
          - 'getSurveyLawyer(surveyId: string) → Get lawyer_id'
          - 'getSurveyByToken(token: string) → Get survey + lawyer'
          - 'getAppointmentsByLawyer(lawyerId: string, date: Date)'
        complexity: 'medium'

      - path: 'apps/website/app/api/calendar/slots/route.ts'
        type: 'api-route'
        action: 'GET endpoint returning available slots'
        depends_on:
          - 'apps/website/features/calendar/types.ts'
          - 'apps/website/features/calendar/queries.ts'
          - 'apps/cms/lib/google-calendar/events.ts'
        method: 'GET'
        query_params:
          - 'surveyId: string (required)'
          - 'date: string (YYYY-MM-DD, required)'
        response:
          type: 'TimeSlot[]'
          example:
            - 'startTime: "09:00", endTime: "10:00"'
            - 'startTime: "10:15", endTime: "11:15"'
        algorithm:
          - '1. Get lawyer_id from surveyId'
          - '2. Fetch lawyer tokens from users table'
          - '3. Call getEvents() from cms/lib/google-calendar/events.ts'
          - '4. Calculate available slots (working hours 9-17, 60 min slots, 15 min buffer)'
          - '5. Filter out: busy times, past times, lunch break'
          - '6. Return sorted array'
        error_handling:
          - 'Invalid surveyId → 404'
          - 'Lawyer has no calendar token → Return message "Calendar not connected"'
          - 'Google API error → Return empty array with error flag'
          - 'Past date → Return empty array'
        complexity: 'high'
        notes: 'This is the HEART of the booking feature'

    acceptance_criteria:
      - 'API returns available slots for valid surveyId + date'
      - 'Slots respect 9 AM - 5 PM working hours'
      - 'Excludes busy times from lawyer calendar'
      - 'Applies 15-minute buffer between appointments'
      - 'Handles timezone correctly (Europe/Warsaw)'
      - 'Returns empty array if no slots'
      - 'Error handling for disconnected calendar'

    testing:
      - 'Unit: Test slot calculation algorithm'
      - 'Integration: With mock Google events, verify gaps calculated'
      - 'Integration: Real API call with test lawyer calendar'
      - 'Edge case: Lawyer has no gaps → returns empty'
      - 'Edge case: Past date → returns empty'
      - 'Timezone: Test during DST transition'

    build_verify:
      - 'npm run build (Website) - no errors'
      - 'API route properly typed'

    notes:
      - 'CRITICAL dependency for booking component'
      - 'Slot calculation is complex - test thoroughly'
      - 'Timezone bugs common - use date-fns with explicit timezone'

  - phase: 4
    name: 'Website - Booking Component UI (Parallel with Phase 5)'
    type: sequential
    blocks_next: true
    build_verify: true
    testing_required: true
    duration: '3 hours'

    parallel_with: 'Phase 5 (Booking API) - can start in parallel after slots API done'

    files:
      - path: 'apps/website/features/calendar/components/CalendarBooking.tsx'
        type: 'component'
        action: 'Create client component for date/time selection'
        depends_on:
          - 'apps/website/features/calendar/types.ts'
          - 'apps/website/app/api/calendar/slots/route.ts'
        component_type: 'Client Component (use client)'
        props:
          - 'surveyId: string'
          - 'responseId: string'
        state_management:
          - 'selectedDate: Date | null'
          - 'availableSlots: TimeSlot[]'
          - 'selectedSlot: TimeSlot | null'
          - 'isLoadingSlots: boolean'
          - 'isSubmittingBooking: boolean'
          - 'bookingConfirmed: boolean'
        flow:
          - '1. User selects date from date picker'
          - '2. Component calls GET /api/calendar/slots'
          - '3. Display available slots in grid'
          - '4. User clicks slot to select'
          - '5. Show booking form (name, email, notes)'
          - '6. User submits → calls POST /api/calendar/book'
          - '7. Show confirmation message'
        ui_elements:
          - 'Date picker (react-datepicker or native input[type=date])'
          - 'Time slot grid (buttons)'
          - 'Booking form (name, email, notes text area)'
          - 'Submit button (disabled during submission)'
          - 'Confirmation message'
          - 'Loading spinners'
          - 'Error alerts'
        validation:
          - 'Name: required'
          - 'Email: required, valid email format'
          - 'Notes: optional'
        complexity: 'high'
        risk: 'State management complexity - multiple loading states'

    acceptance_criteria:
      - 'Client can select date from date picker'
      - 'Available time slots load after date selection'
      - 'Client can click time slot to select'
      - 'Booking form appears with client details fields'
      - 'Form validates (name and email required)'
      - 'Submit button disabled during submission'
      - 'Success message shows after booking confirmed'
      - 'Error handling for API failures'
      - 'Mobile responsive'

    testing:
      - 'Manual: Select date, verify slots load'
      - 'Manual: Click slot, verify form appears'
      - 'Manual: Submit with invalid email, verify error'
      - 'Manual: Submit with empty name, verify error'
      - 'Manual: Submit valid form, verify success message'
      - 'Manual: Test on mobile (responsive)'
      - 'Behavior: Disable submit button during submission'

    build_verify:
      - 'npm run build (Website) - no errors'

    notes:
      - 'This is the CLIENT-FACING booking interface'
      - 'UX critical - must be intuitive'
      - 'Error messages must be clear for non-technical users'

  - phase: 5
    name: 'Website - Booking Creation API (Parallel with Phase 4)'
    type: sequential
    blocks_next: true
    build_verify: true
    testing_required: true
    duration: '2-2.5 hours'

    parallel_with: 'Phase 4 (Booking Component) - can start after slots API done'

    files:
      - path: 'apps/website/app/api/calendar/book/route.ts'
        type: 'api-route'
        action: 'POST endpoint to create appointment'
        depends_on:
          - 'apps/cms/lib/google-calendar/events.ts'
          - 'apps/website/app/api/calendar/slots/route.ts'
        method: 'POST'
        request_body:
          - 'surveyId: string'
          - 'responseId: string'
          - 'startTime: ISO string'
          - 'endTime: ISO string'
          - 'clientName: string'
          - 'clientEmail: string'
          - 'notes?: string'
        response:
          success:
            - 'appointmentId: string'
            - 'message: string'
            - 'confirmationDetails: {startTime, endTime, lawyerEmail}'
          error:
            - 'errorCode: string'
            - 'message: string'
        algorithm:
          - '1. Validate request body (Zod schema)'
          - '2. Get survey → lawyer_id → tenant_id'
          - '3. Check for conflicts:'
          - '   a. Query appointments table for overlapping times'
          - '   b. Query Google Calendar for conflicts'
          - '4. Create appointment in database'
          - '5. Create Google Calendar event'
          - '6. Store google_calendar_event_id in appointments'
          - '7. Return appointmentId + confirmation'
        error_handling:
          - 'Invalid request body → 400'
          - 'Survey not found → 404'
          - 'Double-booking detected → 409 Conflict'
          - 'Google API failure → 503 Service Unavailable'
          - 'Database error → 500'
        double_booking_prevention:
          - 'Query appointments WHERE start_time < endTime AND end_time > startTime'
          - 'Query Google Calendar getEvents()'
          - 'If conflict → return 409 "Time slot no longer available"'
        complexity: 'high'
        risk: 'Double-booking race condition - must use database transactions'
        risk_mitigation: 'Use Supabase atomic insert + check before insert'

    acceptance_criteria:
      - 'Creates appointment in database with all fields'
      - 'Creates event in lawyer Google Calendar'
      - 'Links appointment to response_id'
      - 'Stores google_calendar_event_id for future updates'
      - 'Prevents double-booking (conflict detection)'
      - 'Returns appointmentId on success'
      - 'Error handling for API failures'
      - 'Handles concurrent bookings safely'

    testing:
      - 'Unit: Validate request body schema'
      - 'Integration: Create appointment, verify in database'
      - 'Integration: Verify event created in Google Calendar'
      - 'Integration: Query google_calendar_event_id populated'
      - 'Edge case: Double-booking attempt → returns 409'
      - 'Edge case: Google API timeout → graceful error'
      - 'Concurrency: Two bookings same slot → one succeeds, one fails'

    build_verify:
      - 'npm run build (Website) - no errors'

    notes:
      - 'CRITICAL - prevents double-booking'
      - 'Race condition risk - test concurrency'
      - 'Google API integration must be resilient'

  - phase: 6
    name: 'Website - Success Page Integration'
    type: sequential
    blocks_next: false
    build_verify: true
    testing_required: true
    duration: '1-1.5 hours'

    depends_on: ['Phase 4: Booking Component', 'Phase 5: Booking API']

    files:
      - path: 'apps/website/app/api/survey/submit/route.ts'
        type: 'api-route-update'
