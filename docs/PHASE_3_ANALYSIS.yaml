    notes:
      - 'This completes the client-facing flow'
      - 'Must have fallback for missing calendar'

  - phase: 7
    name: 'CMS - Appointments List (BONUS)'
    type: sequential
    blocks_next: false
    build_verify: true
    testing_required: false
    duration: '1.5 hours'

    optional: true
