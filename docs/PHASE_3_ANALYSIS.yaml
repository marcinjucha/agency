          - 'Redirect URL: /survey/{token}/success?responseId={id}'
        complexity: 'low'

      - path: 'apps/website/app/survey/[token]/success/page.tsx'
        type: 'page-update'
        action: 'Integrate CalendarBooking component'
        depends_on: ['apps/website/features/calendar/components/CalendarBooking.tsx']
        changes:
