---

## TESTING REQUIREMENTS

testing_strategy:
  business_flows:
    - flow: 'Lawyer connects Google Calendar'
      personas: ['Lawyer']
      validates:
        - 'OAuth flow works'
        - 'Token stored securely'
        - 'Status shows Connected'

    - flow: 'Client books appointment after survey'
      personas: ['Client', 'Lawyer']
      validates:
        - 'Form → Success page with calendar'
        - 'Date selection works'
        - 'Slots load correctly'
        - 'Appointment created in DB'
        - 'Event created in Google Calendar'
        - 'Confirmation message shows'

    - flow: 'Double-booking prevention'
      personas: ['Client (2 concurrent)']
      validates:
        - 'Same slot bookable by only one client'
        - 'Second client gets "slot unavailable"'

    - flow: 'Expired link blocks booking'
      personas: ['Client with old link']
      validates:
        - 'Calendar unavailable message shows'
        - 'Form not submittable'

  developer_critical:
    - 'Token refresh works automatically'
    - 'RLS policies isolate tenant data'
    - 'Timezone handling correct (Europe/Warsaw)'
    - 'Google API errors handled gracefully'
    - 'Supabase operations atomic (no partial writes)'

  edge_cases:
    - 'Lawyer has no calendar connected'
    - 'Lawyer calendar has no free slots'
    - 'Past dates return empty slots'
    - 'Google API rate limit exceeded'
    - 'Token revoked externally (lawyer removed from calendar)'
    - 'Network timeout during booking'
    - 'Concurrent booking attempts (race condition)'

  skip_trivial:
    - 'Component renders checks'
    - 'Button has className'
    - 'Form inputs accept text'
    - 'Date picker opens'

