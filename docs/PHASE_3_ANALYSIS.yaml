## CRITICAL DEPENDENCIES & BLOCKING

critical_path:
  - phase_0: 'Google Cloud Setup'
    blocks: ['phase_1']
    reason: 'Need credentials for environment variables'

  - phase_1: 'CMS OAuth'
    blocks: ['phase_2', 'phase_3', 'phase_4']
    reason: 'Tokens must be stored before other phases can access them'

  - phase_2: 'CMS Calendar Events'
    blocks: ['phase_3', 'phase_5']
    reason: 'Website needs events.ts to calculate slots and create appointments'

  - phase_3: 'Website Slots API'
    blocks: ['phase_4', 'phase_5']
    reason: 'Booking component and API both need working slots endpoint'

parallelization_opportunities:
  - phases: [4, 5]
    name: 'Booking Component & API can develop in parallel'
    reason: 'Both depend on Phase 3 (Slots API). Component UI can use mock data initially.'
    implementation:
      - 'Phase 4: Start with mock availableSlots data'
      - 'Phase 5: Build booking API independently'
      - 'Phase 4: Integrate with real API once Phase 5 done'
    risk: 'Low - clear interface boundary'
    estimated_time_saved: '30-45 minutes'

sequential_phases:
  - 'Phase 0 → Phase 1: Google credentials needed'
  - 'Phase 1 → Phase 2: OAuth tokens needed'
  - 'Phase 2 → Phase 3,4,5: Calendar events needed'
  - 'Phase 6: Must come after Phase 4 & 5 complete'

