## RISK ASSESSMENT

risks:
  - category: 'Token Expiration'
    severity: 'P1-CRITICAL'
    description: 'Access tokens expire after 1 hour. Refresh token logic must be automatic and fail gracefully.'
    probability: 'high'
    mitigation:
      - 'Implement refreshAccessToken() in oauth.ts'
      - 'Call automatically in events.ts before API calls'
      - 'Test token refresh with expired tokens'
      - 'Monitor token refresh failures in logs'
    acceptance_criteria:
      - 'Refresh happens transparently (user doesn't know)'
      - 'No silent failures - log all refresh attempts'

  - category: 'Double Booking Race Condition'
    severity: 'P1-CRITICAL'
    description: 'Two clients book same slot concurrently. Only one should succeed.'
    probability: 'medium'
    mitigation:
      - 'Check conflicts BEFORE inserting appointment'
      - 'Use database transaction for atomicity'
      - 'Query both appointments table AND Google Calendar'
      - 'Load test with concurrent bookings'
    acceptance_criteria:
      - 'Second client gets clear error: "Slot no longer available"'
      - 'Only one appointment created'

  - category: 'Timezone Bugs'
    severity: 'P1-CRITICAL'
    description: 'Poland uses Europe/Warsaw timezone. DST transitions tricky.'
    probability: 'medium'
    mitigation:
      - 'Use date-fns with explicit timezone: tz.format(date, format, { timeZone: "Europe/Warsaw" })'
      - 'Never use native Date methods'
      - 'Test during DST transition (March, October)'
      - 'Verify slots calculation respects DST'
    acceptance_criteria:
      - 'Slots calculated correctly year-round'
      - 'No "off by 1 hour" errors'

  - category: 'Google API Rate Limits'
    severity: 'P2-HIGH'
    description: 'Calendar API has quota limits. High traffic may exceed.'
    probability: 'low'
    mitigation:
      - 'Cache available slots (consider Redis in future)'
      - 'Implement exponential backoff for retries'
      - 'Return error message when quota exceeded'
      - 'Monitor API usage in Google Cloud Console'
    acceptance_criteria:
      - 'No sudden API failures under normal load'

  - category: 'Lawyer Disconnects Calendar'
    severity: 'P2-HIGH'
    description: 'Lawyer revokes access or tokens become invalid'
    probability: 'high'
    mitigation:
      - 'Show clear message to client: "Calendar currently unavailable"'
      - 'Return empty slots array + "calendar unavailable" flag'
      - 'Lawyer sees disconnect message in CMS'
      - 'Client form remains functional (doesn't crash)'
    acceptance_criteria:
      - 'No crashes - graceful degradation'
      - 'Clear user messaging'

  - category: 'Import/Dependency Issues'
    severity: 'P2-HIGH'
    description: 'cms/lib/google-calendar files used by website - monorepo dependency issues'
    probability: 'low'
    mitigation:
      - 'Use shared package pattern if cms-specific code needed in website'
      - 'Or: Move google-calendar to packages/google-calendar'
      - 'Test imports after each phase'
      - 'Watch for circular dependencies'
    acceptance_criteria:
      - 'npm run build succeeds for both apps'

  - category: 'Environment Variables Missing'
    severity: 'P1-CRITICAL'
    description: 'Missing GOOGLE_CLIENT_ID/SECRET in .env.local'
    probability: 'high'
    mitigation:
      - 'Provide .env.example template'
      - 'Check for missing vars at startup'
      - 'Show clear error if missing'
    acceptance_criteria:
      - 'Clear error message if vars missing'
      - '.env.example provided'

