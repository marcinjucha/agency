project:
  name: "Halo Efekt"
  type: monorepo
  notion_project: "AAA-P-4"
  tech_stack: "Turborepo, Next.js 16 (App Router), React 19, Tailwind CSS 4, shadcn/ui, Supabase (PostgreSQL 17 + RLS), TanStack Query 5, React Hook Form 7, Zod 3, n8n (self-hosted), Resend, AWS S3, Google Calendar API"

architecture:
  key_decisions:
    - "API Routes for public submissions — better HTTP context for anonymous ops, service role key safe when tenant_id from DB"
    - "RLS for multi-tenancy — database-level enforcement prevents data leaks"
    - "JSONB for survey responses — dynamic schemas, no migration for new question types"
    - "TanStack Query only in CMS — Website is mostly static SSR/SSG"
    - "getUserWithTenant() shared auth — extracted from 4x duplication, returns { supabase, userId, tenantId }"
    - "createAnonClient() for ALL website queries — server client calls cookies() which fails at build time during ISR"
    - "queries.ts (browser) vs queries.server.ts (server) — wrong naming causes silent build-time bugs"
    - "Feature-based folder structure (ADR-005) — thin route files <20 lines, business logic in features/"
    - "Centralized messages in lib/messages.ts — ~220 strings, nested by feature, prepares for i18n"
    - "Centralized routes in lib/routes.ts — prevents typos in hrefs, revalidatePath, API fetch calls"
    - "Fire-and-forget webhook pattern for n8n — don't block user requests, workflow runs async"
    - "TiptapEditor extracted to features/editor/ with dependency injection — blog and legal pages share editor, no duplication"
    - "consent question type always required — enforced in website validation (always-required Zod refine), not in shared schema (packages/validators); CMS builder uses it like any other question type"

features:
  # Phase 1: Foundation
  - name: "Monorepo & Infrastructure"
    status: done
    description: "Turborepo + npm workspaces with shared packages (ui, database, validators)"
    why: "Code sharing across apps, independent deployments, type-safe integrations"

  - name: "Authentication System"
    status: done
    description: "Supabase Auth with email/password, middleware-protected /admin routes, cookie sessions"
    why: "Secure user access to CMS, session management for protected routes"

  - name: "Database Schema & Multi-Tenancy"
    status: done
    description: "6 tables with RLS (tenants, users, surveys, survey_links, responses, appointments), JSONB responses, auto-generated TS types"
    why: "Multi-tenant data isolation, flexible survey schemas, performance indexes"

  - name: "CMS Admin Layout"
    status: done
    description: "Responsive sidebar (grouped: Intake/Content/System), dashboard with real-time stats. All CMS list pages have gallery/list toggle with localStorage persistence (useViewMode hook). Gallery is default view; unified grid breakpoints: 1col/<768px, 2col/<1280px, 3col/<1536px, 4col/>=1536px."
    why: "Navigation hub for business users; gallery-first views reduce cognitive load for visual content"

  # Phase 1: Survey System
  - name: "Survey Builder"
    status: done
    description: "7 question types (text, textarea, email, tel, select, radio, checkbox), RHF + TanStack Query, delete with cascade"
    why: "Empower users to create custom surveys without code"

  - name: "Survey Link Generation"
    status: done
    description: "UUID tokens with expiration, submission limits, inline editing, is_active toggle. Atomic counter via PostgreSQL function"
    why: "Secure, shareable links with expiration and submission controls"

  - name: "Dynamic Survey Form"
    status: done
    description: "Client-facing form rendered from JSON, Zod schema generation, RHF Controller for checkboxes"
    why: "Anonymous survey submission with runtime validation"

  - name: "Form Submission & Response Storage"
    status: done
    description: "API Route for anonymous inserts, JSONB answers, atomic submission counter, service role key"
    why: "Persist client responses with multi-tenant isolation"

  - name: "Response Management UI"
    status: done
    description: "Response list + detail view in CMS, question-answer pairs, delete with appointment-aware warning"
    why: "CMS users view and manage submitted responses"

  # Phase 3: Calendar
  - name: "Calendar Integration"
    status: done
    description: "Google Calendar OAuth, available slots API (timezone-aware, buffer time), booking UI, event creation, calendar_settings per user"
    why: "Appointment scheduling after form submission, synced with Google Calendar"
    depends_on: ["Form Submission & Response Storage"]

  # Phase 4: UI/UX
  - name: "Design System & Accessibility"
    status: done
    description: "shadcn/ui components, WCAG 2.1 AA (semantic HTML, keyboard nav, focus management), LoadingState/ErrorState/EmptyState, responsive layouts, CMS dark+orange theme"
    why: "Consistent component library, accessibility compliance, brand consistency"

  # Phase 5: n8n & AI
  - name: "n8n Infrastructure"
    status: done
    description: "Self-hosted on Hetzner VPS, Docker Compose (9 services), queue mode with 2 workers, Redis, PostgreSQL 16, Traefik SSL"
    why: "Workflow automation for AI analysis and email notifications"

  - name: "AI Qualification Workflow"
    status: done
    description: "8-node n8n workflow: webhook trigger, Claude Haiku 4.5 analysis, JSONB scoring (0-10), fire-and-forget from website"
    why: "Automated client qualification to prioritize high-value leads"
    depends_on: ["n8n Infrastructure", "Form Submission & Response Storage"]

  - name: "Email Notifications + Template Management"
    status: done
    description: "n8n Send Email subworkflow (per-tenant config, Resend fallback), Form Confirmation workflow, CMS block editor with live preview, email_templates table with RLS"
    why: "Automated confirmation emails with per-tenant template customization"
    depends_on: ["n8n Infrastructure"]

  - name: "Monitoring & Error Handling"
    status: done
    description: "GlitchTip error tracking, Prometheus + Grafana + AlertManager, Slack/email alerts, 30-day retention"
    why: "Track workflow execution, alert on failures, monitor AI costs"
    depends_on: ["n8n Infrastructure"]

  # Phase 6: Marketing & Content
  - name: "Blog / Articles with WYSIWYG Editor"
    status: done
    description: "Tiptap editor (JSON+HTML), S3 images, categories, SEO metadata, scheduled publishing (draft/scheduled/published derived from is_published+published_at), ISR revalidate=60. Website: /blog listing + /blog/[slug] detail + /blog/preview/[token]"
    why: "CMS-managed blog for agency marketing, SEO-optimized public pages"

  - name: "Landing Page CMS"
    status: done
    description: "7 block types (navbar, hero, identification, problems, process, results, cta, footer), block editor + live preview, DEFAULT_BLOCKS fallback, ISR revalidate=3600"
    why: "Editable marketing website without code deployment"

  - name: "Media Library"
    status: done
    description: "Multi-tenant media management (S3), drag-drop upload, 6 types (image, video, youtube, vimeo, instagram, tiktok), Tiptap extensions for all types, Insert Media modal in blog editor"
    why: "Centralized asset management, reuse across blog posts, no duplicate uploads"
    depends_on: ["Blog / Articles with WYSIWYG Editor"]

  - name: "Media Library Folders"
    status: done
    task_id: "AAA-T-136"
    description: "Folder tree sidebar with nested hierarchy, CRUD (create/rename/delete), move items between folders, filter by folder. Backward compatible — existing media items visible in all views. Upload inherits current folder context."
    why: "Organize growing media libraries by project or client, unblocks shop product editor (AAA-T-137)"
    depends_on: ["Media Library"]
    completion_notes: "Admins can create nested folder hierarchies, move media items between folders, and filter by folder. Existing media items remain visible in root view without migration."

  - name: "Legal Pages & Cookie Banner"
    status: done
    task_id: "AAA-T-162"
    description: "CMS-managed /polityka-prywatnosci with shared Tiptap editor (dependency injection), cookie consent via localStorage, sitemap integration. Simplified cookie banner (Plausible-only, no marketing cookies). New 'consent' question type in survey builder — required RODO checkbox with configurable consent_url linking to privacy policy. /regulamin removed from website footer (hidden when unpublished). Privacy policy markdown file at docs/polityka-prywatnosci.md ready for CMS. Pre-existing CMS bugs fixed: radio/checkbox label swap in messages.ts, disabled submit when form invalid (mode: onChange), question spacing improvements."
    why: "RODO compliance before analytics and lead collection go live"
    depends_on: ["Landing Page CMS", "Survey Builder"]
    completion_notes: "Visitors see an accurate privacy policy (Plausible-only, no marketing cookies). Survey forms include a required RODO consent checkbox with link to privacy policy, blocking submission without consent. Cookie banner copy simplified to reflect reality. Regulamin removed from footer."

  - name: "SEO Foundations"
    status: done
    description: "site_settings table (org-level config), OG+Twitter meta tags, Organization+Article JSON-LD, robots.ts, sitemap with DB timestamps, keyword management, Google Search Console verification"
    why: "Marketing content discoverable and shareable"
    depends_on: ["Blog / Articles with WYSIWYG Editor", "Landing Page CMS"]

  - name: "CTA → Survey Flow Integration"
    status: not_started
    description: "Connect landing page CTA buttons to existing survey+calendar flow for lead acquisition"
    why: "Close the marketing-to-intake loop — visitor clicks CTA, fills survey, books appointment"
    depends_on: ["Landing Page CMS", "Survey Link Generation", "Calendar Integration"]
    blockers: ["Survey needs to be created in CMS with contact questions (imie, firma, email, telefon, opis potrzeby)"]

  # Phase 7: Intake & Permissions
  - name: "Intake Hub"
    status: done
    description: "Unified /admin/intake replacing 3 pages. @dnd-kit Kanban (Nowy→Skwalifikowany→W kontakcie→Zamkniety), JIRA-style inline detail panel (xl+), autosave notes, StatsBar, URL searchParams filters"
    why: "Single view for full lead lifecycle from first contact to closure"
    depends_on: ["Response Management UI", "AI Qualification Workflow"]

  - name: "Roles & Permissions System"
    status: not_started
    description: "user_roles (super_admin/admin/member) + feature_permissions for granular overrides, RLS policies with role check, middleware route protection, sidebar hiding per role"
    why: "Multi-user access control needed before client onboarding"
    depends_on: ["Authentication System"]

  - name: "Email: Booking Confirmation"
    status: not_started
    description: "n8n workflow triggered after booking creation — email to client (date, time, link) + notification to firm"
    why: "Client and firm need confirmation after appointment booking"
    depends_on: ["Calendar Integration", "Email Notifications + Template Management"]

  - name: "Email: Booking Reminder"
    status: not_started
    description: "n8n scheduled workflow — daily check for tomorrow's appointments, reminder email to client"
    why: "Reduce no-shows by reminding clients 24h before appointment"
    depends_on: ["Email: Booking Confirmation"]

  # Phase 8: Infrastructure
  - name: "Plausible Analytics"
    status: done
    description: "Self-hosted on VPS, 4 script extensions, typed conversion funnel (CTA Clicked→Survey Started→Survey Submitted→Booking Completed), CtaLink client component"
    why: "Privacy-friendly analytics without cookie consent"

  # Workflow Engine (AAA-P-4 extension)
  - name: "Workflow Engine"
    status: in_progress
    task_id: "AAA-T-143"
    description: "Per-tenant workflow automation. Visual builder (reactflow), CMS routing + n8n execution. 11 iterations. Iterations 1-10 done: DB schema, CMS foundation, list+CRUD, email template variables, ReactFlow canvas, config panels (6 types: trigger/send_email/condition/delay/webhook/ai_action), save/load canvas to DB, panel registry pattern, variable inserter in SendEmail, survey selector in trigger, execution engine (trigger matching, topological sort step sequencing, condition branching, async n8n dispatch with callbacks, circular protection depth=1, webhook SSRF guard, optimistic lock on concurrent callbacks, fire-and-forget survey trigger from website, n8n Workflow Action Executor subworkflow), delay step (resume_at in DB, paused/waiting/processing statuses, claim_due_delay_steps() RPC with FOR UPDATE SKIP LOCKED, n8n cron processor every 5 min, /api/workflows/resume + /api/workflows/process-due-delays endpoints), execution logs UI (global list with filters by workflow/status, 5s polling, execution detail with step timeline, collapsible JSON payloads, error blocks, sidebar Historia nav, waiting_for_callback status added), booking+lead_score triggers (booking_created fire-and-forget in booking.ts with rich payload: appointmentId/responseId/surveyLinkId/clientEmail/appointmentAt; lead_scored from n8n AI analysis workflow via HTTP Request node; condition evaluator strips {{}} syntax; HOST_URL reused for website→CMS communication; score remapped to overallScore in buildTriggerContext), 3 built-in workflow templates (form_confirmation/booking_notification/follow_up) with WorkflowTemplateSelector UI, executor hardening (MAX_STEPS=50, per-step 5min timeout, per-step try/catch), ConditionNode handle IDs corrected (yes/no → true/false), WORKFLOW_CALLBACK_URL deduped into HOST_URL, manual E2E test guide (docs/guides/workflow/WORKFLOW_E2E_TEST.md)."
    why: "Automate repetitive business processes (email sequences, status updates, notifications) per tenant without code changes"
    depends_on: ["Email Notifications + Template Management", "n8n Infrastructure"]
    completion_notes: "Iterations 1-10 complete. Iter 10 (AAA-T-153): 3 built-in templates with WorkflowTemplateSelector, executor hardened with MAX_STEPS/timeout/try-catch, ConditionNode handles fixed, HOST_URL dedup, E2E test guide written. Iteration 11 (manual cancel/retry, real-time status) remains as nice-to-have backlog."

  # Backlog
  - name: "Multi-language Support (PL/EN)"
    status: not_started
    why: "Expand reach to English-speaking clients"

  - name: "External Integrations (CRM, Slack)"
    status: not_started
    why: "Connect with external systems for notifications and client management"

  - name: "Reporting & Data Export"
    status: not_started
    why: "Export responses, leads, appointments to CSV/PDF"

  - name: "Tenant Onboarding Flow"
    status: not_started
    why: "Guided setup for new tenants (company profile, survey creation, calendar connect)"

  - name: "Newsletter System"
    status: not_started
    why: "Email campaigns from CMS with subscriber management and RODO compliance"

  - name: "Email: Booking Cancellation"
    status: not_started
    why: "Cancellation notification workflow — requires cancel/reschedule flow"
    depends_on: ["Email: Booking Confirmation"]
