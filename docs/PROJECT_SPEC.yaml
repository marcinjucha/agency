    - name: "Production Readiness"
      status: "pending"
      why: "Error tracking, analytics, security audit, E2E tests"
      acceptance_criteria:
        - "Error tracking enabled (Sentry)"
        - "Lighthouse score > 90"
        - "No critical security vulnerabilities"
