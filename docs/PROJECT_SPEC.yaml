# PROJECT_SPEC.yaml — Project Specification (NOT a task log)
#
# PURPOSE: Describe what this system does and why. Used by AI agents to understand
#          project capabilities, architecture decisions, and feature status.
#
# WHAT BELONGS HERE:
#   - features: name, status, description (current capability), why (business value), depends_on
#   - architecture.key_decisions: non-obvious trade-offs, constraints, cross-feature contracts
#
# WHAT DOES NOT BELONG HERE:
#   - completion_notes, iteration logs, bug fix history, test counts → use memory.md or git log
#   - Implementation details ("fixed X", "iter 1-3 complete", "key gotchas") → not spec content
#   - Obvious framework patterns derivable from code → not architectural decisions
#
# UPDATE RULE: When a feature ships, set status: done and write a 1-2 sentence capability
#              description. Do not record HOW it was built — only WHAT it does.

project:
  name: "Halo Efekt"
  type: monorepo
  notion_project: "AAA-P-4"
  tech_stack: "Turborepo, CMS: TanStack Start v1.167 + Vite 8 (port 3004, migrating) + Next.js 16 App Router (port 3001, legacy coexisting during migration), Website: Next.js 16, React 19, Tailwind CSS 4, shadcn/ui, Supabase (PostgreSQL 17 + RLS), TanStack Query 5, React Hook Form 7, Zod 3, neverthrow + remeda (functional patterns), n8n (self-hosted), Resend, AWS S3, Google Calendar API"

architecture:
  key_decisions:
    - "RLS for multi-tenancy — database-level enforcement prevents data leaks"
    - "JSONB for survey responses — dynamic schemas, no migration for new question types"
    - "Feature-based folder structure (ADR-005) — thin route files <20 lines, business logic in features/"
    - "Fire-and-forget webhook pattern for n8n — don't block user requests, workflow runs async"
    - "n8n Orchestrator owns ALL execution — CMS trigger route is ~70 LOC fire-and-forget. Vercel serverless timeout can't handle multi-hour workflow delays"
    - "Multi-provider calendar via CalendarProvider interface — tsdav for CalDAV, googleapis for Google Calendar. Adding new provider = implement interface only"
    - "app_config table for encryption key — Supabase Cloud blocks ALTER DATABASE SET for custom GUCs"
    - "is_super_admin() RLS for global tables (no tenant_id) — DocForge licenses are cross-tenant, accessible to super admins only"
    - "enabled_features JSONB on tenants table — per-tenant feature flags at PermissionKey[] granularity, checked in requireAuth() and sidebar rendering"
    - "Two-step JSONB query for AI results — workflow_executions filtered client-side by trigger_payload->responseId, then step_executions joined. Avoids PostgREST JSONB filter limitation on nested fields"
    - "consent question type always required — enforced in website validation (Zod refine), not in shared schema"
    - "NULL survey_link.workflow_id = no workflow fires — per-link binding, links without workflow_id skip engine entirely"
    - "createAnonClient() for ALL website queries — server client calls cookies() which fails at build time during ISR"
    - "TanStack Start migration via parent branch strategy — child branches per feature merge back to parent; parent merges to main when ALL features done"

features:
  # Phase 1: Foundation
  - name: "Monorepo & Infrastructure"
    status: done
    description: "Turborepo + npm workspaces with shared packages (ui, database, validators)"
    why: "Code sharing across apps, independent deployments, type-safe integrations"

  - name: "Authentication System"
    status: done
    description: "Supabase Auth with email/password, middleware-protected /admin routes, cookie sessions"
    why: "Secure user access to CMS, session management for protected routes"

  - name: "Database Schema & Multi-Tenancy"
    status: done
    description: "RLS-enforced multi-tenant schema with JSONB responses and auto-generated TS types"
    why: "Multi-tenant data isolation, flexible survey schemas"

  - name: "CMS Admin Layout"
    status: done
    description: "Responsive sidebar with grouped navigation, dashboard with real-time stats, gallery/list toggle with localStorage persistence"
    why: "Navigation hub for business users"

  # Phase 1: Survey System
  - name: "Survey Builder"
    status: done
    description: "7 question types (text, textarea, email, tel, select, radio, checkbox) with drag-and-drop ordering"
    why: "Empower users to create custom surveys without code"

  - name: "Survey Link Generation"
    status: done
    description: "UUID tokens with expiration, submission limits, is_active toggle, atomic counter via PostgreSQL function"
    why: "Secure, shareable links with expiration and submission controls"

  - name: "Dynamic Survey Form"
    status: done
    description: "Client-facing form rendered from JSON with Zod schema generation"
    why: "Anonymous survey submission with runtime validation"

  - name: "Form Submission & Response Storage"
    status: done
    description: "API Route for anonymous inserts with JSONB answers and atomic submission counter"
    why: "Persist client responses with multi-tenant isolation"

  - name: "Response Management UI"
    status: done
    description: "Response list and detail view in CMS with question-answer pairs and delete with appointment-aware warning"
    why: "CMS users view and manage submitted responses"

  # Phase 3: Calendar
  - name: "Calendar Integration"
    status: done
    task_id: "AAA-T-126"
    description: "Multi-provider calendar system (CalDAV + Google Calendar) behind CalendarProvider interface. Per-tenant and per-user connections with per-survey calendar assignment. Encrypted credentials storage"
    why: "Appointment scheduling after form submission, supporting company's own CalDAV server alongside Google Calendar"
    depends_on: ["Form Submission & Response Storage"]

  # Phase 4: UI/UX
  - name: "Design System & Accessibility"
    status: done
    description: "shadcn/ui components, WCAG 2.1 AA compliance, loading/error/empty states, CMS dark+orange theme"
    why: "Consistent component library, accessibility compliance, brand consistency"

  # Phase 5: n8n & AI
  - name: "n8n Infrastructure"
    status: done
    description: "Self-hosted on Hetzner VPS, Docker Compose with queue mode (2 workers), Redis, PostgreSQL, Traefik SSL"
    why: "Workflow automation for AI analysis and email notifications"

  - name: "AI Qualification Workflow"
    status: done
    description: "n8n workflow: webhook trigger, Claude Haiku 4.5 analysis, JSONB scoring (0-10), fire-and-forget from website"
    why: "Automated client qualification to prioritize high-value leads"
    depends_on: ["n8n Infrastructure", "Form Submission & Response Storage"]

  - name: "Email Notifications + Template Management"
    status: done
    description: "n8n Send Email subworkflow with per-tenant config and Resend fallback. CMS block editor with live preview for email templates"
    why: "Automated confirmation emails with per-tenant template customization"
    depends_on: ["n8n Infrastructure"]

  - name: "Monitoring & Error Handling"
    status: done
    description: "GlitchTip error tracking, Prometheus + Grafana + AlertManager, Slack/email alerts"
    why: "Track workflow execution, alert on failures, monitor AI costs"
    depends_on: ["n8n Infrastructure"]

  # Phase 6: Marketing & Content
  - name: "Blog / Articles with WYSIWYG Editor"
    status: done
    description: "Tiptap editor (JSON+HTML), S3 images, categories, SEO metadata, scheduled publishing, ISR. Public /blog listing and detail pages with sort control"
    why: "CMS-managed blog for agency marketing, SEO-optimized public pages"

  - name: "Landing Page CMS"
    status: done
    description: "7 block types (navbar, hero, identification, problems, process, results, cta, footer), block editor with live preview, ISR"
    why: "Editable marketing website without code deployment"

  - name: "Media Library"
    status: done
    description: "Multi-tenant media management (S3), drag-drop upload, 6 media types (image, video, youtube, vimeo, instagram, tiktok), Tiptap extensions, nested folder hierarchy"
    why: "Centralized asset management, reuse across blog posts"
    depends_on: ["Blog / Articles with WYSIWYG Editor"]

  - name: "Legal Pages & Cookie Banner"
    status: done
    task_id: "AAA-T-162"
    description: "CMS-managed privacy policy with shared Tiptap editor, cookie consent banner, consent question type in survey builder with configurable consent_url"
    why: "RODO compliance before analytics and lead collection go live"
    depends_on: ["Landing Page CMS", "Survey Builder"]

  - name: "SEO Foundations"
    status: done
    description: "site_settings table, OG+Twitter meta tags, JSON-LD, robots.txt, sitemap with DB timestamps, keyword management, Search Console verification"
    why: "Marketing content discoverable and shareable"
    depends_on: ["Blog / Articles with WYSIWYG Editor", "Landing Page CMS"]

  - name: "CTA → Survey Flow Integration"
    status: not_started
    description: "Connect landing page CTA buttons to survey+calendar flow for lead acquisition"
    why: "Close the marketing-to-intake loop — visitor clicks CTA, fills survey, books appointment"
    depends_on: ["Landing Page CMS", "Survey Link Generation", "Calendar Integration"]
    blockers: ["Survey needs to be created in CMS with contact questions"]

  # Phase 7: Intake & Permissions
  - name: "Intake Hub"
    status: done
    description: "Unified /admin/intake with @dnd-kit Kanban board, JIRA-style inline detail panel, autosave notes, StatsBar, URL searchParams filters"
    why: "Single view for full lead lifecycle from first contact to closure"
    depends_on: ["Response Management UI", "AI Qualification Workflow"]

  - name: "Roles & Permissions System"
    status: done
    task_id: "AAA-T-61"
    description: "Complete RBAC: tenant_roles, role_permissions, user_roles tables. Type-safe PermissionKey union. requireAuth() consolidates auth+permission check across all Server Actions. User and role management CRUD with PermissionPicker. Super admin cross-tenant access"
    why: "Multi-user access control needed before client onboarding"
    depends_on: ["Authentication System"]

  - name: "Tenant Management + Feature Flags"
    status: done
    task_id: "AAA-T-170"
    description: "Tenant CRUD with per-tenant feature flags at PermissionKey[] granularity. Scope Bar for super admin cross-tenant context switching. Auto-syncing role permissions on feature flag changes"
    why: "Control feature access per organisation before client onboarding"
    depends_on: ["Roles & Permissions System"]

  - name: "Email: Booking Confirmation"
    status: not_started
    description: "n8n workflow for booking confirmation emails to client and firm"
    why: "Client and firm need confirmation after appointment booking"
    depends_on: ["Calendar Integration", "Email Notifications + Template Management"]

  - name: "Email: Booking Reminder"
    status: not_started
    description: "n8n scheduled workflow for 24h appointment reminders"
    why: "Reduce no-shows by reminding clients before appointment"
    depends_on: ["Email: Booking Confirmation"]

  # Phase 8: Infrastructure
  - name: "Plausible Analytics"
    status: done
    description: "Self-hosted Plausible with typed conversion funnel (CTA Clicked→Survey Started→Survey Submitted→Booking Completed)"
    why: "Privacy-friendly analytics without cookie consent"

  # Workflow Engine
  - name: "Workflow Engine"
    status: done
    task_id: "AAA-T-143"
    description: "Per-tenant workflow automation with visual ReactFlow builder, 6 step types (trigger/send_email/condition/delay/webhook/ai_action), n8n Orchestrator for execution, test mode with dry-run, execution logs UI with step timeline. Plugin architecture via step-registry.ts (defineStep factory). 3 built-in templates"
    why: "Automate repetitive business processes per tenant without code changes"
    depends_on: ["Email Notifications + Template Management", "n8n Infrastructure"]

  - name: "DocForge License Management"
    status: done
    task_id: "AAA-T-171"
    description: "CMS admin panel for DocForge desktop app licenses. License CRUD, seat enforcement, machine activation tracking with freshness indicators"
    why: "Super admins need license management UI without direct DB access"
    depends_on: ["Roles & Permissions System"]

  - name: "TanStack Start Migration — CMS Core"
    status: done
    task_id: "AAA-T-192"
    description: "TanStack Start scaffold in apps/cms/ alongside Next.js (dual-framework coexistence). Auth flow via createServerFn, admin layout with sidebar, Sentry integration"
    why: "Migrate off Next.js App Router to enable self-hosted VPS deployment without Vercel"
    depends_on: ["Workflow Engine"]

  - name: "TanStack Start Migration — Surveys & Intake"
    status: done
    task_id: "AAA-T-193"
    description: "Surveys, Intake, and Responses migrated from Next.js Server Actions to TanStack Start createServerFn"
    why: "Heaviest CMS features — migrating them unblocks Next.js removal"
    depends_on: ["TanStack Start Migration — CMS Core"]

  - name: "TanStack Start Migration — Workflow & Calendar"
    status: done
    task_id: "AAA-T-194"
    description: "Workflow Builder, Calendar, Settings, Users, Roles, Tenants, and Email Templates migrated to TanStack Start with prefetchQuery loaders"
    why: "Unblocks Next.js removal from CMS"
    depends_on: ["TanStack Start Migration — Surveys & Intake"]

  - name: "TanStack Start Migration — Content"
    status: done
    task_id: "AAA-T-195"
    description: "Blog (list/editor/new), Landing Page, Email Templates, and Media Library migrated to TanStack Start. S3 presigned URLs via createServerFn with auth, @unpic/react image rendering, as const domain unions for MediaType/BlogPostStatus/EmailTemplateType"
    why: "Unblocks Next.js removal from CMS"
    depends_on: ["TanStack Start Migration — CMS Core"]

  - name: "TanStack Start Migration — Shop & Marketplace"
    status: not_started
    task_id: "AAA-T-196"
    description: "Shop products, categories, and marketplace integrations migrated to TanStack Start"
    why: "Unblocks Next.js removal from CMS"
    depends_on: ["TanStack Start Migration — CMS Core"]

  # Backlog
  - name: "Multi-language Support (PL/EN)"
    status: not_started
    why: "Expand reach to English-speaking clients"

  - name: "External Integrations (CRM, Slack)"
    status: not_started
    why: "Connect with external systems for notifications and client management"

  - name: "Reporting & Data Export"
    status: not_started
    why: "Export responses, leads, appointments to CSV/PDF"

  - name: "Tenant Onboarding Flow"
    status: not_started
    why: "Guided setup for new tenants (company profile, survey creation, calendar connect)"

  - name: "Newsletter System"
    status: not_started
    why: "Email campaigns from CMS with subscriber management and RODO compliance"

  - name: "Email: Booking Cancellation"
    status: not_started
    why: "Cancellation notification workflow — requires cancel/reschedule flow"
    depends_on: ["Email: Booking Confirmation"]
