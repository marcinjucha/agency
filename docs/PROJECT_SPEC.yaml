project:
  name: "Legal-Mind"
  description: "SaaS platform for Polish law firms to streamline client intake through smart surveys, calendar booking, and AI qualification"
  version: "2.0.0"
  status: "in-progress"
  last_updated: "2025-12-12"
  overall_progress: "25%"
  note: "Phase 1 complete (100%). Phase 2 in-progress (75% - blocked on form submission RLS). Next: Fix submission + add response management"

phases:
  - name: "Phase 1: Foundation & CMS Core"
    id: "phase-1"
    description: "Monorepo setup, authentication, database, and survey builder"
    status: "complete"
    progress: 100
    estimated_duration: "3 weeks"

    features:
      - name: "Monorepo & Infrastructure"
        id: "monorepo-setup"
        description: "Turborepo with shared packages, builds, and deployment pipeline"
        status: "complete"

        acceptance_criteria:
          - description: "Turborepo configured with npm workspaces"
            verified: true
          - description: "Both apps build independently without errors"
            verified: true
          - description: "Shared packages (ui, database, validators) accessible from both apps"
            verified: true
          - description: "TypeScript strict mode enabled globally"
            verified: true

        dependencies: []

        files_involved:
          - path: "turbo.json"
            type: "config"
            description: "Turborepo pipeline configuration"
          - path: "package.json"
            type: "config"
            description: "Workspace definition and shared scripts"
          - path: "packages/ui/package.json"
            type: "config"
            description: "Shared UI components package"

        tech_stack:
          - name: "Turborepo"
            version: "^2.0"
            why: "Code sharing, independent deployments, smart caching"
          - name: "npm workspaces"
            version: "^10.0"
            why: "Monorepo package management"

        notes: "Configured for zero-config deployments on Vercel"

      - name: "Authentication System"
        id: "authentication"
        description: "Email/password login for lawyers, session management via Supabase Auth"
        status: "complete"

        acceptance_criteria:
          - description: "Lawyer can register with email and password"
            verified: true
          - description: "Lawyer can login to CMS admin panel"
            verified: true
          - description: "Middleware protects /admin routes from unauthenticated users"
            verified: true
          - description: "Sessions persisted in cookies, survives page reload"
            verified: true
          - description: "Lawyer can logout successfully"
            verified: true

        dependencies:
          - feature_id: "database-schema"
            reason: "Needs users table and Supabase Auth setup"

        files_involved:
          - path: "apps/cms/app/login/page.tsx"
            type: "page"
            description: "Login form page"
          - path: "apps/cms/middleware.ts"
            type: "action"
            description: "Route protection middleware"
          - path: "apps/cms/lib/supabase/server.ts"
            type: "utility"
            description: "Server-side Supabase client with auth context"

        tech_stack:
          - name: "Supabase Auth"
            version: "built-in"
            why: "Email/password, session management, multi-tenant support"
          - name: "Next.js Middleware"
            version: "^16"
            why: "Protect routes before rendering"

        notes: "Uses JWT tokens in cookies for secure session management"

      - name: "Database Schema & Multi-Tenancy"
        id: "database-schema"
        description: "PostgreSQL schema with 6 tables, RLS policies for multi-tenant isolation"
        status: "complete"

        acceptance_criteria:
          - description: "6 tables created: tenants, users, surveys, survey_links, responses, appointments"
            verified: true
          - description: "Row Level Security (RLS) enforces tenant isolation"
            verified: true
          - description: "All tables have proper indexes for common queries"
            verified: true
          - description: "TypeScript types auto-generated from schema"
            verified: true

        dependencies: []

        files_involved:
          - path: "supabase/migrations/20250105000001_initial_schema.sql"
            type: "migration"
            description: "Initial schema with all 6 tables"
          - path: "packages/database/src/types.ts"
            type: "type"
            description: "Auto-generated TypeScript types from Supabase"

        tech_stack:
          - name: "PostgreSQL"
            version: "^17"
            why: "JSONB support, RLS policies, performance"
          - name: "Supabase"
            version: "cloud"
            why: "Managed PostgreSQL, Auth, Realtime, free tier"

        notes: "Every table has tenant_id column for RLS filtering"

      - name: "CMS Admin Layout"
        id: "cms-admin-layout"
        description: "Admin sidebar navigation, dashboard, layout structure"
        status: "complete"

        acceptance_criteria:
          - description: "Admin sidebar displays with navigation links"
            verified: true
          - description: "Dashboard page shows real-time stats (surveys, responses, appointments)"
            verified: true
          - description: "Layout responsive on mobile"
            verified: true
          - description: "Sidebar collapses on small screens"
            verified: true

        dependencies:
          - feature_id: "authentication"
            reason: "Only authenticated users see admin layout"
          - feature_id: "monorepo-setup"
            reason: "Needs @legal-mind/ui package for components"

        files_involved:
          - path: "apps/cms/components/admin/Sidebar.tsx"
            type: "component"
            description: "Navigation sidebar with links to features"
          - path: "apps/cms/app/admin/layout.tsx"
            type: "layout"
            description: "Admin layout wrapper"
          - path: "apps/cms/app/admin/page.tsx"
            type: "page"
            description: "Dashboard homepage"
          - path: "apps/cms/app/providers.tsx"
            type: "provider"
            description: "TanStack Query setup for CMS app"

        tech_stack:
          - name: "React"
            version: "^19"
            why: "Component-based UI"
          - name: "Tailwind CSS"
            version: "^4"
            why: "Utility-first styling"

        notes: "Dashboard stats query will be implemented in Phase 2"

      - name: "Survey Builder"
        id: "survey-builder"
        description: "Drag-drop UI for creating surveys with 7 question types"
        status: "complete"

        acceptance_criteria:
          - description: "Lawyer can create new survey with title and description"
            verified: true
          - description: "Lawyer can add questions of 7 types: text, textarea, email, tel, select, radio, checkbox"
            verified: true
          - description: "Lawyer can edit question text and options"
            verified: true
          - description: "Lawyer can delete questions with confirmation"
            verified: true
          - description: "Questions persist to database on save"
            verified: true
          - description: "Survey list shows all surveys for tenant"
            verified: true

        dependencies:
          - feature_id: "authentication"
            reason: "Only authenticated lawyers can create surveys"
          - feature_id: "database-schema"
            reason: "Needs surveys and survey_links tables"

        files_involved:
          - path: "apps/cms/features/surveys/actions.ts"
            type: "action"
            description: "Server Actions: createSurvey, updateSurvey, deleteSurvey"
          - path: "apps/cms/features/surveys/queries.ts"
            type: "query"
            description: "Fetch surveys and survey details"
          - path: "apps/cms/features/surveys/components/SurveyBuilder.tsx"
            type: "component"
            description: "Main survey editor component"
          - path: "apps/cms/features/surveys/components/SurveyList.tsx"
            type: "component"
            description: "List view of all surveys"
          - path: "apps/cms/app/admin/surveys/page.tsx"
            type: "page"
            description: "Survey list route"
          - path: "apps/cms/app/admin/surveys/new/page.tsx"
            type: "page"
            description: "Create survey route"
          - path: "apps/cms/app/admin/surveys/[id]/page.tsx"
            type: "page"
            description: "Edit survey route"
          - path: "packages/validators/src/survey.ts"
            type: "validator"
            description: "Zod schema for survey validation"

        tech_stack:
          - name: "React Hook Form"
            version: "^7"
            why: "Complex form state management"
          - name: "Zod"
            version: "^3"
            why: "Type-safe validation"
          - name: "TanStack Query"
            version: "^5"
            why: "Survey data caching and synchronization"

        notes: "7 question types support: text (single/multi-line), email, phone, select (dropdown), radio buttons, checkboxes"

      - name: "Survey Link Generation"
        id: "survey-link-generation"
        description: "Generate unique shareable links with optional expiration and submission limits"
        status: "complete"

        acceptance_criteria:
          - description: "Lawyer can generate unique survey link with UUID token"
            verified: true
          - description: "Link can be copied to clipboard with visual feedback"
            verified: true
          - description: "Link can have optional expiration date"
            verified: true
          - description: "Link can have optional max submission limit"
            verified: true
          - description: "Lawyer can delete links with confirmation dialog"
            verified: true
          - description: "Link list shows all links with submission counts and status"
            verified: true
          - description: "Expired or maxed-out links show error to clients"
            verified: true

        dependencies:
          - feature_id: "survey-builder"
            reason: "Requires existing survey"
          - feature_id: "database-schema"
            reason: "Needs survey_links table"

        files_involved:
          - path: "apps/cms/features/surveys/components/SurveyLinks.tsx"
            type: "component"
            description: "Link generation and management UI"
          - path: "apps/cms/features/surveys/queries.ts"
            type: "query"
            description: "getSurveyLinks() for fetching links"
          - path: "apps/cms/features/surveys/actions.ts"
            type: "action"
            description: "generateLink, deleteLink Server Actions"
          - path: "supabase/migrations/20251210143628_add_public_survey_access.sql"
            type: "migration"
            description: "RLS policy for public survey access and increment_submission_count() function"

        tech_stack:
          - name: "crypto.randomUUID()"
            version: "built-in"
            why: "Generate unique tokens"
          - name: "TanStack Query"
            version: "^5"
            why: "Real-time link list updates"

        notes: "Unlimited submissions by default (max_submissions = null), RLS allows anonymous link reads"

  - name: "Phase 2: Client Survey Form & Response Management"
    id: "phase-2"
    description: "Dynamic form rendering, client submission, and CMS response display"
    status: "in-progress"
    progress: 75
    estimated_duration: "1 week"

    features:
      - name: "Dynamic Survey Form"
        id: "dynamic-survey-form"
        description: "Render survey questions dynamically from JSON, with client-side validation"
        status: "complete"

        acceptance_criteria:
          - description: "Anonymous client can access survey via unique link token"
            verified: true
          - description: "All 7 question types render correctly (text, textarea, email, tel, select, radio, checkbox)"
            verified: true
          - description: "Form validates on client-side (required fields, email format, phone format, checkbox minimums)"
            verified: true
          - description: "Validation errors display inline under each field"
            verified: true
          - description: "Submit button disabled during submission"
            verified: true
          - description: "Submission errors show error alert above form"
            verified: true

        dependencies:
          - feature_id: "survey-link-generation"
            reason: "Needs survey links to access forms"
          - feature_id: "database-schema"
            reason: "Needs responses table"

        files_involved:
          - path: "apps/website/app/survey/[token]/page.tsx"
            type: "page"
            description: "Survey form route - fetches survey by token and renders SurveyForm"
          - path: "apps/website/features/survey/queries.ts"
            type: "query"
            description: "getSurveyByToken() with link validation logic"
          - path: "apps/website/features/survey/components/SurveyForm.tsx"
            type: "component"
            description: "React Hook Form integration with Zod validation"
          - path: "apps/website/features/survey/components/QuestionField.tsx"
            type: "component"
            description: "Renderer for 7 question types"
          - path: "apps/website/features/survey/validation.ts"
            type: "validator"
            description: "Dynamic Zod schema generation from survey questions"
          - path: "apps/website/features/survey/types.ts"
            type: "type"
            description: "Question and SurveyData TypeScript types"

        tech_stack:
          - name: "React Hook Form"
            version: "^7"
            why: "Form state and submission"
          - name: "Zod"
            version: "^3"
            why: "Dynamic schema generation and validation"
          - name: "next/navigation"
            version: "^16"
            why: "Client-side routing"

        notes: "Checkbox fields use React Hook Form Controller for array handling"

      - name: "Form Submission & Response Storage"
        id: "form-submission"
        description: "Server Action to save responses to database, atomically increment submission counter"
        status: "in-progress"

        acceptance_criteria:
          - description: "Client form submission saves to responses table"
            verified: false
          - description: "Response includes survey_link_id, answers (JSONB), tenant_id, status"
            verified: false
          - description: "Submission count atomically incremented on survey_links"
            verified: false
          - description: "RLS policy allows anonymous inserts to responses"
            verified: false
          - description: "Success redirect to /survey/{token}/success page"
            verified: true
          - description: "Error messages display for invalid links (expired, maxed-out, not found)"
            verified: true

        dependencies:
          - feature_id: "dynamic-survey-form"
            reason: "Form must render before submission is possible"
          - feature_id: "database-schema"
            reason: "Needs responses table with RLS"

        files_involved:
          - path: "apps/website/features/survey/actions.ts"
            type: "action"
            description: "submitSurveyResponse Server Action"
          - path: "apps/website/features/survey/queries.ts"
            type: "query"
            description: "getSurveyByToken with validation"
          - path: "supabase/migrations/[new]_enable_public_responses.sql"
            type: "migration"
            description: "RLS policy to allow anonymous response inserts (TODO)"

        tech_stack:
          - name: "Server Actions"
            version: "next/next-compat"
            why: "Secure form submission without API routes"
          - name: "Supabase"
            version: "cloud"
            why: "Database persistence with RLS"

        notes: "RLS policy for responses.INSERT already created in migrations (20251210143628 + later updates)"

      - name: "Success Page & Redirect"
        id: "success-page"
        description: "Thank you page after successful submission with next steps preview"
        status: "complete"

        acceptance_criteria:
          - description: "Client redirected to /survey/{token}/success after submission"
            verified: true
          - description: "Success page displays thank you message"
            verified: true
          - description: "Success page shows next steps (calendar booking preview)"
            verified: true
          - description: "Page is accessible only after form submission (via redirect)"
            verified: true

        dependencies:
          - feature_id: "form-submission"
            reason: "Redirected to after successful submission"

        files_involved:
          - path: "apps/website/app/survey/[token]/success/page.tsx"
            type: "page"
            description: "Success page component"

        tech_stack:
          - name: "Next.js"
            version: "^16"
            why: "Dynamic routing"

        notes: "Placeholder for Phase 3 calendar booking preview"

      - name: "Response Management UI (CMS)"
        id: "response-management"
        description: "Display submitted client responses in admin panel with list view and detail view"
        status: "pending"

        acceptance_criteria:
          - description: "Lawyer can view all responses for their tenant"
            verified: false
          - description: "Response list shows client email, submission date, status, survey title"
            verified: false
          - description: "Lawyer can click response to view detail with all question-answer pairs"
            verified: false
          - description: "Response detail shows AI qualification (placeholder for Phase 5)"
            verified: false
          - description: "Responses filtered by tenant_id via RLS"
            verified: false
          - description: "Empty state shows when no responses exist"
            verified: false
          - description: "Loading state while fetching responses"
            verified: false

        dependencies:
          - feature_id: "form-submission"
            reason: "Can only show responses after form submission works"
          - feature_id: "authentication"
            reason: "Only authenticated lawyers can view responses"

        files_involved:
          - path: "apps/cms/features/responses/components/ResponseList.tsx"
            type: "component"
            description: "List view with TanStack Query"
          - path: "apps/cms/features/responses/components/ResponseDetail.tsx"
            type: "component"
            description: "Individual response detail view"
          - path: "apps/cms/features/responses/queries.ts"
            type: "query"
            description: "getResponses, getResponse query functions"
          - path: "apps/cms/features/responses/types.ts"
            type: "type"
            description: "Response TypeScript types"
          - path: "apps/cms/app/admin/responses/page.tsx"
            type: "page"
            description: "Responses list route"
          - path: "apps/cms/app/admin/responses/[id]/page.tsx"
            type: "page"
            description: "Response detail route"
          - path: "apps/cms/components/admin/Sidebar.tsx"
            type: "component"
            description: "Add Responses navigation link"

        tech_stack:
          - name: "TanStack Query"
            version: "^5"
            why: "Fetch and cache responses"
          - name: "React"
            version: "^19"
            why: "Component composition"

        notes: "RLS ensures lawyers only see their tenant's responses. Phase 5 will add AI qualification display."

  - name: "Phase 3: Calendar Integration"
    id: "phase-3"
    description: "Google Calendar OAuth, available slots, and booking flow"
    status: "pending"
    progress: 0
    estimated_duration: "1 week"

    features:
      - name: "Google Calendar OAuth"
        id: "google-calendar-oauth"
        description: "Connect lawyer's Google Calendar with OAuth 2.0, store refresh tokens"
        status: "pending"

        acceptance_criteria:
          - description: "Lawyer can initiate Google Calendar connection from CMS settings"
            verified: false
          - description: "OAuth flow redirects to Google, asks for calendar permissions"
            verified: false
          - description: "Refresh token securely stored in users.google_calendar_token"
            verified: false
          - description: "Lawyer can disconnect/revoke calendar access"
            verified: false
          - description: "Token refresh logic handles expired tokens"
            verified: false

        dependencies:
          - feature_id: "authentication"
            reason: "Only authenticated lawyers can connect calendar"
          - feature_id: "database-schema"
            reason: "Needs google_calendar_token field in users table"

        files_involved:
          - path: "apps/cms/lib/google-calendar/oauth.ts"
            type: "utility"
            description: "OAuth flow and token management"
          - path: "apps/cms/app/admin/settings/calendar/page.tsx"
            type: "page"
            description: "Calendar connection settings"

        tech_stack:
          - name: "Google Calendar API"
            version: "v3"
            why: "Calendar access and event management"
          - name: "next-auth"
            version: "^5 (optional)"
            why: "OAuth helper (or implement custom)"

        notes: "Requires Google Cloud project setup and credentials"

      - name: "Available Slots API"
        id: "available-slots-api"
        description: "Fetch lawyer's calendar, calculate available slots with buffer time"
        status: "pending"

        acceptance_criteria:
          - description: "API endpoint /api/calendar/slots returns available time slots"
            verified: false
          - description: "Slots respect working hours (9 AM - 5 PM by default)"
            verified: false
          - description: "15-minute buffer between appointments"
            verified: false
          - description: "Handles timezone correctly"
            verified: false
          - description: "Prevents double-booking"
            verified: false

        dependencies:
          - feature_id: "google-calendar-oauth"
            reason: "Needs access token to fetch calendar events"

        files_involved:
          - path: "apps/website/app/api/calendar/slots/route.ts"
            type: "api"
            description: "GET endpoint for available slots"
          - path: "apps/cms/lib/google-calendar/events.ts"
            type: "utility"
            description: "Calendar event fetching and slot calculation"

        tech_stack:
          - name: "Google Calendar API"
            version: "v3"
            why: "Fetch calendar events"
          - name: "date-fns"
            version: "^3"
            why: "Timezone-aware slot calculation"

        notes: "Slot calculation algorithm: fetch events → find gaps → apply buffer → return available slots"

      - name: "Calendar Booking UI"
        id: "calendar-booking-ui"
        description: "Date picker and time slot selector on survey success page"
        status: "pending"

        acceptance_criteria:
          - description: "Client sees calendar interface after form submission"
            verified: false
          - description: "Client can select date from calendar picker"
            verified: false
          - description: "Selected date shows available time slots"
            verified: false
          - description: "Client can click slot to book appointment"
            verified: false
          - description: "Booking confirmation shows appointment details"
            verified: false

        dependencies:
          - feature_id: "success-page"
            reason: "Calendar display replaces placeholder on success page"
          - feature_id: "available-slots-api"
            reason: "Needs slots API to populate UI"

        files_involved:
          - path: "apps/website/features/survey/components/CalendarBooking.tsx"
            type: "component"
            description: "Date picker and slot selector"
          - path: "apps/website/app/survey/[token]/success/page.tsx"
            type: "page"
            description: "Integrate calendar into success page"

        tech_stack:
          - name: "react-datepicker"
            version: "^4 (or headless-ui)"
            why: "Calendar UI component"

        notes: "Consider accessibility (keyboard navigation, screen readers)"

      - name: "Booking Creation & Notifications"
        id: "booking-creation"
        description: "Create appointment in database and Google Calendar, send confirmations"
        status: "pending"

        acceptance_criteria:
          - description: "Booking creates record in appointments table"
            verified: false
          - description: "Booking creates event in lawyer's Google Calendar"
            verified: false
          - description: "Double-booking prevention works (conflict detection)"
            verified: false
          - description: "Confirmation email sent to client"
            verified: false
          - description: "Notification sent to lawyer"
            verified: false
          - description: "Calendar invite attached to confirmation emails"
            verified: false

        dependencies:
          - feature_id: "calendar-booking-ui"
            reason: "User interaction to trigger booking"
          - feature_id: "google-calendar-oauth"
            reason: "Needs calendar write access"

        files_involved:
          - path: "apps/website/app/api/calendar/book/route.ts"
            type: "api"
            description: "POST endpoint to create booking"
          - path: "apps/cms/features/appointments/actions.ts"
            type: "action"
            description: "Create appointment, call Google API"

        tech_stack:
          - name: "Supabase"
            version: "cloud"
            why: "Store appointments"
          - name: "SendGrid (or Resend)"
            version: "^2"
            why: "Email notifications"
          - name: "Google Calendar API"
            version: "v3"
            why: "Create events"

        notes: "Email notifications to be moved to n8n in Phase 5"

  - name: "Phase 4: Response Analysis & Management"
    id: "phase-4"
    description: "Display AI qualification, response status management, export to PDF"
    status: "pending"
    progress: 0
    estimated_duration: "1 week"

    features:
      - name: "Response Detail View"
        id: "response-detail"
        description: "Show full response with AI qualification and interaction history"
        status: "pending"

        acceptance_criteria:
          - description: "Lawyer can view all question-answer pairs for a response"
            verified: false
          - description: "AI qualification displayed (score, case type, urgency)"
            verified: false
          - description: "Response status shows (new/qualified/disqualified/contacted)"
            verified: false
          - description: "Linked appointment shows if client booked"
            verified: false
          - description: "Interaction timeline (submission date, status changes, notes)"
            verified: false

        dependencies:
          - feature_id: "response-management"
            reason: "Build on response list"

        files_involved:
          - path: "apps/cms/features/responses/components/ResponseDetail.tsx"
            type: "component"
            description: "Detailed response view"
          - path: "apps/cms/app/admin/responses/[id]/page.tsx"
            type: "page"
            description: "Response detail route"

        tech_stack:
          - name: "React"
            version: "^19"
            why: "Component composition"

        notes: "Placeholder for AI qualification from Phase 5"

      - name: "Response Status Management"
        id: "response-status"
        description: "Change response status, add internal notes, track interaction history"
        status: "pending"

        acceptance_criteria:
          - description: "Lawyer can change status: new → qualified/disqualified → contacted"
            verified: false
          - description: "Status change shows timestamp and user who made change"
            verified: false
          - description: "Lawyer can add internal notes to response"
            verified: false
          - description: "Notes persist and show in timeline"
            verified: false
          - description: "Status changes trigger email notification (Phase 5)"
            verified: false

        dependencies:
          - feature_id: "response-detail"
            reason: "Status controls in detail view"

        files_involved:
          - path: "apps/cms/features/responses/actions.ts"
            type: "action"
            description: "Update response status, add notes"
          - path: "apps/cms/features/responses/components/ResponseDetail.tsx"
            type: "component"
            description: "Status dropdown and notes editor"

        tech_stack: []

        notes: "Database triggers could auto-timestamp status changes"

      - name: "Response Filtering & Search"
        id: "response-filtering"
        description: "Filter responses by survey, status, date range; search by email/name"
        status: "pending"

        acceptance_criteria:
          - description: "Filter by survey (dropdown)"
            verified: false
          - description: "Filter by status (qualified/disqualified/etc)"
            verified: false
          - description: "Filter by date range"
            verified: false
          - description: "Search by client email or name"
            verified: false
          - description: "Pagination (100 per page)"
            verified: false

        dependencies:
          - feature_id: "response-management"
