project:
  name: "Halo-Efekt"
  description: "SaaS platform for businesses to streamline client intake through smart surveys, calendar booking, and AI qualification — built by Halo Efekt"
  version: "2.0.0"
  status: "in-progress"
  last_updated: "2026-01-21"

# IMPORTANT: This file focuses on WHY (architecture, decisions, rationale)
# For detailed WHAT (acceptance criteria, file paths, task tracking), see Notion:
# - Notion Tasks: Task-level acceptance criteria and implementation details
# - Notion Projects: Feature-level context and dependencies

architecture:
  overview: "Monorepo with two Next.js apps (CMS for business users, Website for clients), shared packages for UI/database/validation"

  tech_stack:
    monorepo:
      - name: "Turborepo"
        version: "^2.0"
        why: "Code sharing across apps, independent deployments, smart caching for build performance"
      - name: "npm workspaces"
        version: "^10.0"
        why: "Native monorepo package management without external tools"

    frontend:
      - name: "Next.js"
        version: "^16 (App Router)"
        why: "RSC for data fetching, Server Actions for mutations, zero-config Vercel deployment"
      - name: "React"
        version: "^19"
        why: "Component composition, hooks for state management"
      - name: "Tailwind CSS"
        version: "^4"
        why: "Utility-first styling, responsive design, design system consistency"
      - name: "shadcn/ui"
        version: "latest"
        why: "Accessible, customizable components (WCAG 2.1 AA compliant)"

    backend:
      - name: "Supabase"
        version: "cloud"
        why: "Managed PostgreSQL + Auth + Realtime, RLS for multi-tenant isolation, generous free tier"
      - name: "PostgreSQL"
        version: "^17"
        why: "JSONB for flexible survey responses, RLS policies for tenant isolation, performance"

    state_management:
      - name: "TanStack Query"
        version: "^5"
        why: "Server state caching, automatic refetching, optimistic updates (CMS only)"
      - name: "React Hook Form"
        version: "^7"
        why: "Complex form state, validation integration with Zod"
      - name: "Zod"
        version: "^3"
        why: "Type-safe validation, runtime schema generation for dynamic surveys"

    future:
      - name: "n8n"
        version: "self-hosted"
        why: "Workflow automation for AI analysis and email notifications (Phase 5)"

  key_decisions:
    - decision: "API Routes for public submissions (not Server Actions)"
      rationale: "Better HTTP context for anonymous operations, service role key usage is safe when tenant_id derived from database"

    - decision: "RLS for multi-tenancy (not application-level filtering)"
      rationale: "Database-level enforcement prevents data leaks, PostgreSQL performance better than app-level joins"

    - decision: "JSONB for survey responses (not relational tables)"
      rationale: "Dynamic survey schemas, flexible question types, simpler queries for response display"

    - decision: "TanStack Query only in CMS (not Website)"
      rationale: "CMS needs caching/refetching, Website is mostly static SSR/SSG"

    - decision: "shadcn/ui (not pre-built component library)"
      rationale: "Full control over components, accessibility out of box, no bundle bloat"

    - decision: "Monorepo with shared packages (not separate repos)"
      rationale: "Type sharing, code reuse, atomic commits across apps"

  design_patterns:
    - pattern: "Feature-based folder structure"
      why: "Co-locate types, queries, actions, components by domain (surveys, responses, appointments)"

    - pattern: "Server Components for data fetching, Client Components for interactivity"
      why: "Minimize client bundle, leverage RSC for auth/database queries"

    - pattern: "Server Actions for mutations, API Routes for public endpoints"
      why: "Server Actions for authenticated ops, API Routes for anonymous clients"

features:
  phase_1_foundation:
    - name: "Monorepo & Infrastructure"
      status: "complete"
      why: "Enable code sharing, independent app deployments, and type-safe integrations"
      acceptance_criteria:
        - "Both apps build independently without errors"
        - "Shared packages accessible from both apps"
        - "TypeScript strict mode enforced globally"
      dependencies: []

    - name: "Authentication System"
      status: "complete"
      why: "Secure user access to CMS, session management for protected routes"
      acceptance_criteria:
        - "Users can register/login with email/password"
        - "Middleware protects /admin routes from unauthenticated users"
        - "Sessions persist in cookies, survive page reload"
      dependencies:
        - feature: "Database Schema"
          reason: "Needs users table and Supabase Auth setup"

    - name: "Database Schema & Multi-Tenancy"
      status: "complete"
      why: "Multi-tenant data isolation via RLS, flexible JSONB responses, performance indexes"
      acceptance_criteria:
        - "6 tables with RLS policies (tenants, users, surveys, survey_links, responses, appointments)"
        - "TypeScript types auto-generated from schema"
        - "Proper indexes for common queries"
      tech_decisions:
        - decision: "JSONB for survey responses"
          rationale: "Dynamic schemas, no migration needed for new question types"
        - decision: "RLS policies on all tables"
          rationale: "Database-level tenant isolation prevents data leaks"
      dependencies: []

    - name: "CMS Admin Layout"
      status: "complete"
      why: "Navigation hub for business users, dashboard for real-time stats"
      acceptance_criteria:
        - "Responsive sidebar navigation"
        - "Dashboard shows real-time stats (surveys, responses, appointments)"
      dependencies:
        - feature: "Authentication"
          reason: "Only authenticated users see admin layout"

    - name: "Survey Builder"
      status: "complete"
      why: "Empower users to create custom surveys without code"
      acceptance_criteria:
        - "Users can create surveys with 7 question types (text, textarea, email, tel, select, radio, checkbox)"
        - "Questions persist to database on save"
        - "Survey list shows all surveys for tenant"
      tech_decisions:
        - decision: "React Hook Form for builder"
          rationale: "Complex form state with nested arrays (questions, options)"
        - decision: "TanStack Query for survey list"
          rationale: "Real-time updates, cache invalidation on mutations"
      dependencies:
        - feature: "Authentication"
        - feature: "Database Schema"

    - name: "Survey Link Generation"
      status: "complete"
      why: "Secure, shareable links with expiration and submission limits"
      acceptance_criteria:
        - "Generate unique links with UUID tokens"
        - "Optional expiration date and max submission limit"
        - "Expired/maxed-out links show error to clients"
      tech_decisions:
        - decision: "RLS allows anonymous link reads"
          rationale: "Clients need to validate link without authentication"
        - decision: "Atomic counter increment via PostgreSQL function"
          rationale: "Prevent race conditions on submission count"
      dependencies:
        - feature: "Survey Builder"

  phase_2_client_form:
    - name: "Dynamic Survey Form"
      status: "complete"
      why: "Client-facing form that renders dynamically from JSON, validates before submission"
      acceptance_criteria:
        - "All 7 question types render correctly"
        - "Client-side validation with inline error messages"
        - "Form accessible via unique link token"
      tech_decisions:
        - decision: "Zod schema generation from survey JSON"
          rationale: "Type-safe validation, runtime schema for dynamic surveys"
        - decision: "React Hook Form Controller for checkboxes"
          rationale: "Array handling for multi-select questions"
      dependencies:
        - feature: "Survey Link Generation"

    - name: "Form Submission & Response Storage"
      status: "complete"
      why: "Persist client responses with multi-tenant isolation, atomic submission counter"
      acceptance_criteria:
        - "Responses saved to database with tenant_id, survey_link_id, answers (JSONB)"
        - "Submission count atomically incremented"
        - "RLS policy allows anonymous inserts"
      tech_decisions:
        - decision: "API Route (not Server Action)"
          rationale: "Better HTTP context for anonymous operations"
        - decision: "Service role key for public submissions"
          rationale: "Safe when tenant_id derived from database, not user input"
      dependencies:
        - feature: "Dynamic Survey Form"

    - name: "Success Page & Redirect"
      status: "complete"
      why: "Confirm submission success, preview next steps (calendar booking)"
      acceptance_criteria:
        - "Thank you message after submission"
        - "Calendar booking UI placeholder (Phase 3)"
      dependencies:
        - feature: "Form Submission"

    - name: "Response Management UI (CMS)"
      status: "complete"
      why: "Users view submitted responses, prepare for AI qualification (Phase 5)"
      acceptance_criteria:
        - "Response list with submission date, status, survey title"
        - "Response detail shows question-answer pairs"
        - "RLS ensures users only see their tenant's responses"
      dependencies:
        - feature: "Form Submission"
        - feature: "Authentication"

  phase_3_calendar:
    - name: "Google Calendar OAuth"
      status: "complete"
      why: "Connect user's calendar for availability and booking"
      acceptance_criteria:
        - "Users can connect/disconnect Google Calendar"
        - "OAuth refresh token stored securely"
      tech_decisions:
        - decision: "Mocked OAuth for MVP"
          rationale: "Avoid Google Cloud setup complexity during development"
      dependencies:
        - feature: "Authentication"

    - name: "Available Slots API"
      status: "complete"
      why: "Calculate user's availability with buffer time, prevent double-booking"
      acceptance_criteria:
        - "API returns available time slots respecting working hours"
        - "15-minute buffer between appointments"
        - "Timezone-aware (Europe/Warsaw with DST)"
      tech_decisions:
        - decision: "date-fns for timezone calculations"
          rationale: "Lightweight, reliable DST handling"
      dependencies:
        - feature: "Google Calendar OAuth"

    - name: "Calendar Booking UI"
      status: "complete"
      why: "Client-facing interface to book appointments after form submission"
      acceptance_criteria:
        - "Date picker and time slot selector"
        - "Booking confirmation shows appointment details"
      dependencies:
        - feature: "Success Page"
        - feature: "Available Slots API"

    - name: "Booking Creation & Notifications"
      status: "complete"
      why: "Persist appointments, sync with Google Calendar, notify participants"
      acceptance_criteria:
        - "Appointment record in database linked to response_id"
          verified: true
        - "Google Calendar event created (REAL - not mock)"
          verified: true
        - "Double-booking prevention (conflict detection)"
          verified: true
      tech_decisions:
        - decision: "Email notifications deferred to n8n (Phase 5)"
          rationale: "Centralize all notifications in workflow automation"
      dependencies:
        - feature: "Calendar Booking UI"
      notes: |
        2026-02-01: Phase 3 COMPLETE - All Code & Testing Done

        CREATED:
        - Shared calendar package (@agency/calendar)
        - Token manager with auto-refresh (5-minute buffer)
        - Real Google Calendar event creation
        - OAuth token refresh logic

        TESTED:
        - P0 Test PASSED: Events appear in Google Calendar
        - Token manager returns valid access token
        - Appointment saves to database even if calendar fails (graceful degradation)
        - Booking API validates conflicts correctly
        - Real screenshot: 2 appointments visible in Google Calendar

        CODE QUALITY:
        - Debug logging removed (console.log cleanup)
        - Only console.error for real errors kept
        - All commented code removed
        - Unused types cleaned up (BookingRequest, Appointment interfaces)

  phase_4_uiux:
    - name: "Accessibility Critical Path"
      status: "complete"
      why: "WCAG 2.1 AA compliance for semantic HTML, keyboard navigation, screen readers"
      acceptance_criteria:
        - "Semantic HTML table structures in AppointmentList and ResponseList"
        - "Keyboard focus management with skip-to-content link"
        - "Accessible Dialog component (replaces window.confirm)"
      tech_decisions:
        - decision: "shadcn/ui Dialog for confirmations"
          rationale: "WCAG-compliant, keyboard accessible, focus trap"
      dependencies: []

    - name: "Design System Foundation"
      status: "complete"
      why: "Centralized component library, consistent status colors, iconography"
      acceptance_criteria:
        - "shadcn/ui components verified and exported from @agency/ui"
        - "Centralized status color utilities"
        - "Lucide Icons for consistent iconography"
      dependencies:
        - feature: "Accessibility Critical Path"

    - name: "Component Library Expansion"
      status: "complete"
      why: "Eliminate duplicated loading/error/empty states, improve maintainability"
      acceptance_criteria:
        - "LoadingState, ErrorState, EmptyState components created"
        - "Replaced custom states in SurveyList, AppointmentList, ResponseDetail, ResponseList"
        - "Skeleton component installed and exported"
      tech_decisions:
        - decision: "4 LoadingState variants (spinner, skeleton, page, inline)"
          rationale: "Match context: full-page vs inline loading"
      dependencies:
        - feature: "Design System Foundation"

    - name: "Responsive Design & Visual Polish"
      status: "complete"
      why: "Touch-friendly targets (WCAG 2.1 AA), responsive layouts, typography hierarchy"
      acceptance_criteria:
        - "Touch target sizes ≥44px (WCAG compliant)"
        - "Responsive table layouts verified"
        - "Typography hierarchy fixed in ResponseDetail"
      dependencies:
        - feature: "Component Library Expansion"

  phase_5_n8n_ai:
    - name: "n8n Infrastructure"
      status: "complete"
      why: "Self-hosted workflow automation for AI analysis and email notifications"
      acceptance_criteria:
        - "n8n running on Hetzner VPS with Docker, SSL, reverse proxy"
          verified: true
        - "Queue mode with 2 workers (Redis message broker)"
          verified: true
        - "PostgreSQL 16 database for workflow storage"
          verified: true
        - "Traefik reverse proxy with Let's Encrypt SSL"
          verified: true
      tech_decisions:
        - decision: "Self-hosted n8n (not cloud)"
          rationale: "Lower cost, full control, privacy compliance"
        - decision: "Queue mode with Redis (not in-memory)"
          rationale: "Scalable workflow execution, prevents main instance blocking, allows horizontal scaling"
      dependencies: []
      notes: |
        2026-02-05: n8n Infrastructure COMPLETE

        DEPLOYED:
        - N8N instance: https://n8n.trustcode.pl/
        - Docker Compose stack (9 services)
        - Queue mode: n8n-app + 2 workers
        - Redis message broker (max 256MB)
        - PostgreSQL 16 (tuned for 4GB RAM)
        - Traefik v3.5 (automatic SSL renewal)

        MONITORING:
        - GlitchTip error tracking (glitchtip.trustcode.pl)
        - Prometheus + Grafana + AlertManager
        - Slack alerts (#n8n-critical, #n8n-monitoring)
        - Email alerts for backups

        CUSTOM MODULES:
        - Sentry SDK (@sentry/node v7.120.4) for Code nodes
        - Mounted as read-only volume: ./custom_modules/node_modules/@sentry

        VPS DETAILS:
        - Location: infra/n8n-vps/ (symlink to n8n-vps repo)
        - Backup strategy: 3-2-1 (daily 2AM, local + AWS S3)

    - name: "AI Qualification Workflow"
      status: "complete"
      why: "Automated client qualification to prioritize high-value leads"
      acceptance_criteria:
        - criterion: "Webhook triggered on form submission"
          verified: true  # Fire-and-forget in apps/website/features/survey/submit.ts:62
        - criterion: "AI analyzes responses and stores results in responses.ai_qualification"
          verified: true  # Workflow tested, works correctly
        - criterion: "8-node workflow with error handling"
          verified: true  # Modified from 7 to 8 nodes (added Fetch Response node)
        - criterion: "Retry logic for API failures (3 retries, 5s delay)"
          verified: true
      tech_decisions:
        - decision: "Claude Haiku 4.5 for AI analysis (not GPT-4)"
          rationale: "37x cheaper ($0.0008 vs $0.03 per request), sufficient quality for 0-10 scoring, native Polish support, <2s response time"
        - decision: "Single model approach (not hybrid GPT-4 + Claude)"
          rationale: "Haiku quality sufficient for qualification task, no need for expensive model combo"
        - decision: "JSONB storage for ai_qualification (not separate tables)"
          rationale: "Flexible schema evolution, can add new fields without migrations, atomic updates"
        - decision: "Fire-and-forget webhook pattern"
          rationale: "Don't block user requests, workflow runs async in background, retry on failure"
        - decision: "Simplified webhook input (responseId only)"
          rationale: "Fetch remaining data via SQL JOIN, reduces payload size, prevents data duplication"
      dependencies:
        - feature: "n8n Infrastructure"
        - feature: "Form Submission"
      notes: |
        2026-02-11: Workflow Simplified & Tested Successfully

        MODIFICATIONS:
        - Simplified webhook input: 4 parameters → 1 parameter (responseId only)
        - Added Node 2 (Fetch Response): SQL JOIN responses + survey_links tables
        - Updated Transform node to use database-fetched data instead of webhook payload
        - Updated Parse node to strip markdown from Claude response
        - All existing error handling and retry logic maintained

        TESTING:
        - Test case: Jan Kowalski (high-value divorce case)
        - responseId: c3d4e5f6-a7b8-9012-cdef-333333333333
        - Result: ai_qualification populated correctly
        - Status changed: new → qualified
        - Execution time: ~6 seconds
        - All nodes executed successfully, no errors

        WORKFLOW STRUCTURE (8 nodes):
        1. Webhook (responseId only)
        2. Fetch Response (NEW - SQL JOIN responses + survey_links)
        3. Fetch Survey (modified to use Node 2 output)
        4. Transform Q&A (modified data sources)
        5. Claude Haiku API (unchanged)
        6. Parse Output (added markdown stripping)
        7. Update Response (unchanged)
        8. Response (returns full qualification object)

        READY FOR:
        - Production testing with real survey submissions
        - Email notifications (Phase 5 - pending)

    - name: "Email Notifications"
      status: "pending"
      why: "Automated confirmation emails, user digests"
      acceptance_criteria:
        - "Client receives form submission confirmation"
        - "User receives daily digest of new responses"
      dependencies:
        - feature: "n8n Infrastructure"

    - name: "Monitoring & Error Handling"
      status: "complete"
      why: "Track workflow execution, alert on failures, monitor AI costs"
      acceptance_criteria:
        - "Failed workflows trigger alerts"
          verified: true
        - "Cost monitoring for AI usage"
          verified: true  # Prometheus tracks execution count
        - "GlitchTip captures workflow errors"
          verified: true
        - "Prometheus scrapes n8n metrics"
          verified: true
        - "Grafana dashboards for visualization"
          verified: true
      tech_decisions:
        - decision: "GlitchTip for error tracking (not Sentry cloud)"
          rationale: "Self-hosted, free, compatible with Sentry SDK, privacy compliant"
        - decision: "Prometheus + Grafana for metrics (not n8n internal)"
          rationale: "Unified monitoring stack, 30-day retention, custom dashboards, AlertManager integration"
      dependencies:
        - feature: "n8n Infrastructure"
      notes: |
        2026-02-05: Monitoring & Error Handling COMPLETE

        ERROR TRACKING:
        - GlitchTip v4.1.3 deployed (glitchtip.trustcode.pl)
        - Sentry SDK in Code nodes (@sentry/node v7.120.4)
        - Error node connected to all workflow failure paths
        - DSN: https://bed6a207b979467bbb60e51d25995111@glitchtip.trustcode.pl/1

        METRICS (PROMETHEUS):
        - N8N metrics endpoint: :5678/metrics
        - Scraped every 15s
        - 30-day retention
        - Metrics include:
          * Workflow execution count/duration
          * Queue metrics (jobs waiting/active/completed)
          * API response times
          * Worker health status

        EXPORTERS:
        - node-exporter (system metrics)
        - redis-exporter (queue metrics)
        - postgres-exporter (database metrics)

        ALERTING (ALERTMANAGER):
        - Critical alerts → Slack #n8n-critical
        - Warning alerts → Slack #n8n-monitoring
        - Info alerts → Email

        GRAFANA DASHBOARDS:
        - N8N overview (execution success rate, duration)
        - Queue metrics (jobs/sec, backlog)
        - System resources (CPU, memory, disk)
        - Database performance (connections, queries/sec)

