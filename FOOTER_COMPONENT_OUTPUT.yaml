# Footer Component - YAML Output Format

components:
  - file: "apps/website/features/marketing/components/Footer.tsx"
    purpose: "Professional footer component for Legal Hub landing page with dark styling, organized links, newsletter signup, and responsive design"
    type: "layout"
    client_component: true
    lines_of_code: 291

    structure:
      main_export: "Footer"
      sub_components:
        - "NewsletterForm"
        - "FooterColumn"
        - "SocialLinks"
      constants:
        - "FOOTER_LINKS"
        - "SOCIAL_LINKS"

    dependencies:
      external:
        - "@agency/ui (Button, Input)"
        - "lucide-react (Github, Twitter, Linkedin, Facebook, Mail, ChevronRight)"
        - "react (useState, FormEvent)"
        - "next/link"

    features:
      layout:
        - "Multi-column responsive grid (2-col mobile, 4-col desktop)"
        - "Branding section with logo and company description"
        - "Four link columns: Product, Company, Legal, Resources"
        - "Newsletter signup form"
        - "Social media links"
        - "Copyright notice with meta links"

      styling:
        - "Dark theme: bg-slate-900 and bg-slate-950"
        - "Light text: text-gray-300 default, text-white headings"
        - "Link colors: text-gray-400 hover:text-white"
        - "Smooth transitions and hover effects"
        - "Fully responsive design"
        - "Semantic HTML structure"

      interactive:
        - "Newsletter form with email validation"
        - "Link hover effects with chevron animation"
        - "Social media icon buttons"
        - "Form success/error messages"
        - "Auto-reset newsletter form"

      accessibility:
        - "ARIA labels on social links"
        - "Semantic HTML (footer, nav, form)"
        - "Proper heading hierarchy (h2, h3)"
        - "Keyboard navigable (Tab, Enter)"
        - "Screen reader optimized"
        - "Color contrast 7:1+"

    responsive_design:
      mobile:
        layout: "2-column link grid, stacked newsletter"
        breakpoint: "< 768px"
        container_width: "full-width"
        columns: 2

      tablet:
        layout: "2-column brand+newsletter, organized links"
        breakpoint: "768px - 1024px"
        container_width: "full-width"
        columns: "2 (brand) + flexible (links)"

      desktop:
        layout: "4-column link grid with proper spacing"
        breakpoint: "> 1024px"
        container_width: "max-w-7xl"
        columns: 4

    state_management:
      NewsletterForm:
        - "email: string"
        - "isSubscribed: boolean"
        - "error: string | null"

      footer_columns:
        static: "No state needed"

    colors:
      background:
        primary: "bg-slate-900"
        secondary: "bg-slate-950"

      text:
        primary: "text-gray-300"
        headings: "text-white"
        secondary: "text-gray-500"
        link_default: "text-gray-400"
        link_hover: "text-white"

      interactive:
        button_default: "bg-blue-600"
        button_hover: "bg-blue-700"
        error: "text-red-400"
        success: "text-green-400"

    typography:
      footer_title: "h2, text-2xl, font-bold"
      column_titles: "h3, text-sm, font-semibold"
      links: "text-sm, text-gray-400"
      meta_text: "text-xs, text-gray-500"
      description: "text-sm, leading-relaxed"

    spacing:
      container_padding: "px-4 sm:px-6 lg:px-8 py-12 md:py-16"
      column_gap: "gap-8"
      link_spacing: "space-y-3"
      social_gap: "gap-4"
      dividers: "border-slate-800"

    interactions:
      links:
        hover_effect: "color transition 200ms, chevron slides in"
        keyboard: "Tab to focus, Enter to follow"
        accessibility: "aria-label on social links"

      newsletter_form:
        states: "default, submitting, success, error"
        validation: "email format check"
        feedback: "error messages, success confirmation"
        auto_reset: "success state resets after 3s"

    browser_support:
      - "Chrome/Edge 90+"
      - "Firefox 88+"
      - "Safari 14+"
      - "Mobile browsers"

      not_supported:
        - "Internet Explorer 11"

    performance:
      initial_load: "Instant (no API calls)"
      javascript: "Minimal (newsletter form only)"
      images: "Icons only (SVG)"
      fonts: "System fonts"
      bundle_impact: "~8KB minified + gzipped"

    testing_coverage:
      manual_tests:
        - "Responsive design on 3 breakpoints"
        - "All links navigate correctly"
        - "Newsletter form validation"
        - "Hover effects visible"
        - "Keyboard navigation"
        - "Screen reader compatibility"

      automated_tests:
        - "Render all sections"
        - "Social media links present"
        - "Newsletter form validation"
        - "Copyright notice displays"

    customization:
      links:
        how: "Edit FOOTER_LINKS object"
        ease: "Very easy (change href values)"

      social_media:
        how: "Edit SOCIAL_LINKS array"
        ease: "Very easy (change URLs and add/remove platforms)"

      branding:
        how: "Update h2 text and tagline in JSX"
        ease: "Very easy (find and replace)"

      colors:
        how: "Modify Tailwind classes"
        ease: "Easy (change bg-*, text-* classes)"

      typography:
        how: "Modify Tailwind text classes"
        ease: "Easy (change text-*, font-* classes)"

    parallel_capable: false
    reason: "Footer is a layout component that must be rendered after all content; makes sense to render sequentially in page structure"

    dependencies_graph:
      - "depends_on: React (hooks)"
      - "depends_on: Next.js (Link)"
      - "depends_on: Tailwind CSS (styling)"
      - "depends_on: @agency/ui (components)"
      - "depends_on: lucide-react (icons)"
      - "no_dependencies_on: external_apis"
      - "no_dependencies_on: state_managers"

    future_enhancements:
      - "Newsletter API integration (TODO comment in code)"
      - "Dynamic content from CMS"
      - "Multi-language support"
      - "Analytics tracking"
      - "Link analytics dashboard"

